<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>HiViews — Video Production</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/portal-manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{background:#000}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:#fff;letter-spacing:-0.005em;-webkit-font-smoothing:antialiased;min-height:100dvh}
        body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

        .hdr{position:sticky;top:0;z-index:40;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.1);padding:12px 16px}
        .hdr-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
        .hdr h1{font-size:18px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
        .count{font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:#00ff88;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);padding:2px 7px;border-radius:4px}
        .live{display:flex;align-items:center;gap:6px;font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,.4)}
        .live .dot{width:6px;height:6px;background:#00ff88;border-radius:50%;animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .chips{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px}
        .chips::-webkit-scrollbar{display:none}
        .chip{white-space:nowrap;background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);padding:6px 14px;border-radius:100px;font:500 11px/1 'Inter',sans-serif;cursor:pointer;transition:all .12s;user-select:none}
        .chip:hover{border-color:rgba(255,255,255,.25);color:#fff}
        .chip.on{background:#00ff88;color:#000;border-color:#00ff88;font-weight:600}

        .wrap{position:relative;z-index:1;padding-bottom:80px}
        .loading{min-height:50vh;display:flex;align-items:center;justify-content:center}
        .spin{width:24px;height:24px;border:2px solid rgba(255,255,255,.1);border-top-color:#00ff88;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        .card{background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.05);padding:14px 16px;transition:background .12s}
        .card:hover{background:rgba(255,255,255,.03)}
        .card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap}
        .badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .row-code{font-family:'Fira Code',ui-monospace,monospace;font-size:11px;color:rgba(255,255,255,.4);font-weight:500}
        .row-status{font-family:'Fira Code',ui-monospace,monospace;font-size:10px}
        .row-avatar{font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,.5)}
        .st-scripted,.st-approved{color:#00ff88}
        .st-rendering,.st-compositing{color:#ff8a00}
        .st-raw_delivered,.st-final_delivered{color:#00ff88}
        .st-published{color:#60a5fa}
        .st-rejected,.st-archived{color:rgba(255,255,255,.3)}
        .st-failed{color:#f87171}
        .row-time{font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,.3);white-space:nowrap}
        .preview{font-size:13px;color:rgba(255,255,255,.75);line-height:1.45;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        video{width:100%;max-height:72vh;border-radius:10px;background:#000;display:block;margin-top:8px}
        .post-link{display:inline-block;margin-top:6px;color:#00ff88;font-size:12px;font-weight:500;text-decoration:none}
        .post-link:hover{text-decoration:underline}
        .actions{display:flex;gap:8px;margin-top:10px}
        .act{flex:1;padding:10px;border-radius:8px;border:0;font:600 13px/1 'Inter',sans-serif;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:40px}
        .act:disabled{opacity:.5;cursor:not-allowed}
        .act.approve{background:#00ff88;color:#000}
        .act.approve:hover:not(:disabled){background:#33ff9f}
        .act.reject{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.3)}
        .act.reject:hover:not(:disabled){background:rgba(239,68,68,.2)}

        .bottomnav{position:fixed;bottom:0;inset-inline:0;z-index:50;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.1);padding-bottom:env(safe-area-inset-bottom)}
        .bottomnav ul{list-style:none;display:grid;grid-template-columns:repeat(5,1fr);height:56px}
        .bottomnav li{display:flex}
        .bottomnav a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:100%;text-decoration:none;font:500 10px/1 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.5)}
        .bottomnav a:hover{color:#fff}
        .bottomnav a.on{color:#00ff88}
        .bottomnav a .icon{font-size:18px}

        .empty{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;text-align:center}
        .empty-icon{font-size:44px;margin-bottom:16px;opacity:.4}
        .empty h2{font-size:16px;font-weight:600;margin-bottom:8px}
        .empty p{font-size:13px;color:rgba(255,255,255,.55);max-width:320px;line-height:1.5}

        .toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#00ff88;color:#000;padding:10px 20px;border-radius:100px;font:600 13px/1 'Inter',sans-serif;z-index:60;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
        .toast.show{opacity:1;transform:translate(-50%,-6px)}
        .toast.err{background:#f87171;color:#fff}
        .err{background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.3);color:#ff8888;padding:10px 14px;border-radius:10px;font-size:13px;margin:12px 16px}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="hdr">
    <div class="hdr-row">
        <h1>Video Production <span class="count" id="count" style="display:none">0</span></h1>
        <span class="live"><span class="dot"></span>LIVE</span>
    </div>
    <div class="chips" id="chips">
        <button class="chip on" data-f="all">All</button>
        <button class="chip" data-f="scripted">Scripted</button>
        <button class="chip" data-f="rendering">Rendering</button>
        <button class="chip" data-f="raw_delivered">Ready to review</button>
        <button class="chip" data-f="final_delivered">Ready to publish</button>
        <button class="chip" data-f="published">Published</button>
    </div>
</header>

<main class="wrap" id="main">
    <div class="loading"><div class="spin"></div></div>
</main>

<nav class="bottomnav">
    <ul>
        <li><a href="/portal/dashboard"><span class="icon">🏠</span>Home</a></li>
        <li><a href="/portal/brand"><span class="icon">📝</span>Brand</a></li>
        <li><a href="/portal/avatars"><span class="icon">🎭</span>Avtr</a></li>
        <li><a href="/portal/scout"><span class="icon">🔍</span>Scout</a></li>
        <li><a href="/portal/videos" class="on"><span class="icon">🎬</span>Video</a></li>
    </ul>
</nav>

<div class="toast" id="toast"></div>

<script>
(function(){
    'use strict';
    const SB_URL = 'https://rkudnkbpnfxpxglaklqs.supabase.co';
    const SB_KEY = 'sb_publishable_Ll3KUfVgGqeCMUTSlAd4bA_YoD-SHkA';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    let session = null, customerId = null, filter = 'all', tasks = [], loaded = false;
    const main = document.getElementById('main');
    const chipsEl = document.getElementById('chips');
    const countEl = document.getElementById('count');
    const toastEl = document.getElementById('toast');

    // Status → swipe/button config. Only raw_delivered and final_delivered
    // expose actionable buttons per the spec.
    const STATUS = {
        scripted:        {label:'Scripted',          actionable:false},
        rendering:       {label:'Rendering',         actionable:false},
        raw_delivered:   {label:'Ready to review',   actionable:true,
                          approve:{next:'final_delivered', label:'▶ Approve'},
                          reject: {next:'scripted',        label:'✕ Reject'}},
        compositing:     {label:'Compositing',       actionable:false},
        final_delivered: {label:'Ready to publish',  actionable:true,
                          approve:{next:'approved',  label:'▶ Publish'},
                          reject: {next:'scripted',  label:'↺ Rewrite'}},
        approved:        {label:'Approved',          actionable:false},
        published:       {label:'Published',         actionable:false},
        rejected:        {label:'Rejected',          actionable:false},
        failed:          {label:'Failed',            actionable:false},
    };

    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
    function ago(iso){const s=Math.max(1,Math.floor((Date.now()-new Date(iso).getTime())/1000));if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return new Date(iso).toLocaleDateString()}
    function statusClass(s){return 'st-' + (s||'').replace(/[^a-z_]/gi,'')}
    function toast(msg,opts={}){toastEl.textContent=msg;toastEl.classList.toggle('err',!!opts.err);toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),opts.ms||1800)}

    function visibleTasks(){
        if(filter==='all') return tasks.filter(t=>t.status!=='rejected'&&t.status!=='archived');
        return tasks.filter(t=>t.status===filter);
    }

    function renderList(){
        const list = visibleTasks();
        countEl.style.display = loaded ? '' : 'none';
        countEl.textContent = list.length;

        if(!loaded){main.innerHTML='<div class="loading"><div class="spin"></div></div>';return}
        if(list.length===0){
            main.innerHTML=`
              <div class="empty">
                <div class="empty-icon">🎬</div>
                <h2>No videos yet</h2>
                <p>Promote a script from your <a href="/portal/scout" style="color:#00ff88">Scout inbox</a> to kick off video production. Rendering takes 3-8 minutes.</p>
              </div>`;
            return;
        }

        main.innerHTML = list.map(t => {
            const s = STATUS[t.status] || {label:t.status, actionable:false};
            const preview = (t.script_text||'').split('\n')[0] || '(no script)';
            const videoUrl = t.final_video_url || t.raw_video_url;
            return `
              <div class="card" data-id="${t.id}">
                <div class="card-head">
                  <div class="badges">
                    <span class="row-code">${esc(t.task_code||'')}</span>
                    <span class="row-status ${statusClass(t.status)}">${esc(s.label)}</span>
                    ${t.avatar_name ? `<span class="row-avatar">🎭 ${esc(t.avatar_name)}</span>` : ''}
                  </div>
                  <span class="row-time">${ago(t.updated_at||t.created_at)}</span>
                </div>
                <p class="preview">${esc(preview)}</p>
                ${videoUrl ? `<video controls preload="metadata" playsinline src="${esc(videoUrl)}"></video>` : ''}
                ${t.post_url ? `<a class="post-link" href="${esc(t.post_url)}" target="_blank">View on Instagram →</a>` : ''}
                ${s.actionable ? `
                  <div class="actions">
                    <button class="act approve" data-act="approve" data-id="${t.id}" data-next="${s.approve.next}">${s.approve.label}</button>
                    <button class="act reject"  data-act="reject"  data-id="${t.id}" data-next="${s.reject.next}">${s.reject.label}</button>
                  </div>` : ''}
              </div>`;
        }).join('');
    }

    chipsEl.addEventListener('click', e=>{
        const c=e.target.closest('.chip'); if(!c) return;
        filter=c.dataset.f;
        Array.from(chipsEl.children).forEach(ch=>ch.classList.toggle('on',ch===c));
        renderList();
    });

    main.addEventListener('click', async e=>{
        const btn = e.target.closest('[data-act]'); if(!btn) return;
        const id = Number(btn.dataset.id);
        const next = btn.dataset.next;
        btn.disabled = true;
        const {error} = await sb.from('video_tasks').update({status:next}).eq('id',id);
        if(error){toast('Update failed: '+error.message,{err:true,ms:3000}); btn.disabled=false; return}
        toast(btn.dataset.act==='approve'?'Moved forward ✓':'Sent back ✓',{ms:1500});
    });

    (async function boot(){
        const {data:{session:s}} = await sb.auth.getSession();
        if(!s){window.location.replace('/sign-in');return}
        session = s;

        customerId = s.user.user_metadata?.customer_id;
        if(!customerId){
            const {data:c} = await sb.from('customers').select('id').eq('email',s.user.email).maybeSingle();
            customerId = c?.id;
        }
        if(!customerId){main.innerHTML='<div class="err">No customer record for your account.</div>';return}

        async function load(){
            const {data, error} = await sb.from('video_tasks')
                .select('*')
                .eq('customer_id', customerId)
                .order('created_at',{ascending:false})
                .limit(100);
            if(error){main.innerHTML='<div class="err">'+esc(error.message||'Failed to load videos.')+'</div>';return}
            tasks = data||[];
            loaded = true;
            renderList();
        }
        await load();
        sb.channel(`videos-${customerId}`)
          .on('postgres_changes',
              {event:'*',schema:'public',table:'video_tasks',filter:`customer_id=eq.${customerId}`},
              ()=>load())
          .subscribe();
    })();

    if ('serviceWorker' in navigator && location.protocol === 'https:') {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/portal-sw.js', { scope: '/portal/' }).catch(()=>{});
        });
    }
})();
</script>
</body>
</html>
