<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>HiViews — Video Production</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/portal-manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{background:#000}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:#fff;letter-spacing:-0.005em;-webkit-font-smoothing:antialiased;min-height:100dvh}
        body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

        .hdr{position:sticky;top:0;z-index:40;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.1);padding:12px 16px}
        .hdr-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
        .hdr h1{font-size:18px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
        .count{font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:#00ff88;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);padding:2px 7px;border-radius:4px}
        .live{display:flex;align-items:center;gap:6px;font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,.4)}
        .live .dot{width:6px;height:6px;background:#00ff88;border-radius:50%;animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .chips{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px}
        .chips::-webkit-scrollbar{display:none}
        .chip{white-space:nowrap;background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);padding:6px 14px;border-radius:100px;font:500 11px/1 'Inter',sans-serif;cursor:pointer;transition:all .12s;user-select:none}
        .chip:hover{border-color:rgba(255,255,255,.25);color:#fff}
        .chip.on{background:#00ff88;color:#000;border-color:#00ff88;font-weight:600}

        .wrap{position:relative;z-index:1;padding:12px 12px 80px}
        .loading{min-height:50vh;display:flex;align-items:center;justify-content:center}
        .spin{width:24px;height:24px;border:2px solid rgba(255,255,255,.1);border-top-color:#00ff88;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Responsive HeyGen-style thumbnail grid.
           Mobile: 2 cols. Tablet 3. Desktop 4. */
        .grid{display:grid;gap:12px;grid-template-columns:repeat(2,minmax(0,1fr))}
        @media (min-width:640px){.grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}}
        @media (min-width:960px){.grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;max-width:1200px;margin:0 auto}}

        /* Card is a portrait tile (9:16-ish) + an action row below. */
        .card{display:flex;flex-direction:column;gap:8px}
        .tile{position:relative;aspect-ratio:9/16;border-radius:14px;overflow:hidden;background:#0a0a0a;border:1px solid rgba(255,255,255,.08);transition:transform .18s cubic-bezier(.2,.7,.2,1),border-color .18s,box-shadow .18s;cursor:pointer}
        .tile:hover{border-color:rgba(0,255,136,.45);box-shadow:0 8px 32px -8px rgba(0,255,136,.25)}
        @media (min-width:640px){.tile:hover{transform:scale(1.02)}}
        .tile video,.tile img.poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:#0a0a0a}
        .tile video{z-index:1;opacity:0;transition:opacity .25s}
        .tile.playing video{opacity:1}
        .tile .placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.25;z-index:0}

        /* Top-left status pill over the tile */
        .tile .pill{position:absolute;top:8px;left:8px;z-index:3;font:600 9px/1 'Fira Code',ui-monospace,monospace;letter-spacing:.04em;text-transform:uppercase;padding:5px 8px;border-radius:100px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.15);white-space:nowrap}
        .pill.st-scripted{color:#a0a0a0}
        .pill.st-rendering,.pill.st-compositing{color:#ff8a00;border-color:rgba(255,138,0,.35)}
        .pill.st-raw_delivered,.pill.st-final_delivered{color:#00ff88;border-color:rgba(0,255,136,.35)}
        .pill.st-approved,.pill.st-published{color:#60a5fa;border-color:rgba(96,165,250,.35)}
        .pill.st-rejected,.pill.st-archived{color:rgba(255,255,255,.35)}
        .pill.st-failed{color:#f87171;border-color:rgba(248,113,113,.4)}

        /* Bottom gradient + task code + avatar name, HeyGen-style */
        .meta{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:28px 10px 10px;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.5) 50%,transparent 100%);pointer-events:none}
        .meta .code{font:500 10px/1 'Fira Code',ui-monospace,monospace;color:rgba(255,255,255,.7);letter-spacing:.05em;margin-bottom:3px}
        .meta .title{font:600 12px/1.3 'Inter',sans-serif;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
        @media (min-width:640px){.meta .title{font-size:13px}}
        .meta .sub{font:500 10px/1 'Inter',sans-serif;color:rgba(255,255,255,.55);margin-top:4px}

        /* Processing spinner overlay for rendering/compositing states */
        .tile.processing::after{content:'';position:absolute;inset:0;z-index:2;background:radial-gradient(circle at center,rgba(255,138,0,.12),transparent 60%)}
        .tile .proc-spin{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;width:32px;height:32px;border:2px solid rgba(255,138,0,.2);border-top-color:#ff8a00;border-radius:50%;animation:spin .8s linear infinite}

        /* Play icon overlay when there's a video to tap */
        .tile .playicon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;padding-left:3px;transition:opacity .18s,transform .18s;pointer-events:none;border:1px solid rgba(255,255,255,.2)}
        .tile.playing .playicon{opacity:0;transform:translate(-50%,-50%) scale(.85)}

        /* Action row below each card */
        .actions{display:flex;gap:6px}
        .act{flex:1;padding:9px 6px;border-radius:8px;border:0;font:600 12px/1 'Inter',sans-serif;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:4px;min-height:38px;transition:background .12s,color .12s,opacity .12s}
        .act:disabled{opacity:.35;cursor:not-allowed}
        .act.approve{background:#00ff88;color:#000}
        .act.approve:hover:not(:disabled){background:#33ff9f}
        .act.archive{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1)}
        .act.archive:hover:not(:disabled){background:rgba(255,255,255,.1);color:#fff}
        .act.publish{background:#60a5fa;color:#000}
        .act.publish:hover:not(:disabled){background:#7cb5fc}
        .act.rewrite{background:rgba(255,138,0,.12);color:#ff8a00;border:1px solid rgba(255,138,0,.3)}
        .act.rewrite:hover:not(:disabled){background:rgba(255,138,0,.2)}
        .act.passive{background:transparent;color:rgba(255,255,255,.4);border:1px dashed rgba(255,255,255,.12);cursor:default}

        .bottomnav{position:fixed;bottom:0;inset-inline:0;z-index:50;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.1);padding-bottom:env(safe-area-inset-bottom)}
        .bottomnav ul{list-style:none;display:grid;grid-template-columns:repeat(5,1fr);height:56px}
        .bottomnav li{display:flex}
        .bottomnav a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:100%;text-decoration:none;font:500 10px/1 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.5)}
        .bottomnav a:hover{color:#fff}
        .bottomnav a.on{color:#00ff88}
        .bottomnav a .icon{font-size:18px}

        .empty{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;text-align:center}
        .empty-icon{font-size:44px;margin-bottom:16px;opacity:.4}
        .empty h2{font-size:16px;font-weight:600;margin-bottom:8px}
        .empty p{font-size:13px;color:rgba(255,255,255,.55);max-width:320px;line-height:1.5}

        .toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#00ff88;color:#000;padding:10px 20px;border-radius:100px;font:600 13px/1 'Inter',sans-serif;z-index:60;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
        .toast.show{opacity:1;transform:translate(-50%,-6px)}
        .toast.err{background:#f87171;color:#fff}
        .err{background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.3);color:#ff8888;padding:10px 14px;border-radius:10px;font-size:13px;margin:12px 16px}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="hdr">
    <div class="hdr-row">
        <h1>Video Production <span class="count" id="count" style="display:none">0</span></h1>
        <span class="live"><span class="dot"></span>LIVE</span>
    </div>
    <div class="chips" id="chips">
        <button class="chip on" data-f="all">All</button>
        <button class="chip" data-f="scripted">Scripted</button>
        <button class="chip" data-f="rendering">Rendering</button>
        <button class="chip" data-f="raw_delivered">Ready to review</button>
        <button class="chip" data-f="final_delivered">Ready to publish</button>
        <button class="chip" data-f="published">Published</button>
    </div>
</header>

<main class="wrap" id="main">
    <div class="loading"><div class="spin"></div></div>
</main>

<nav class="bottomnav">
    <ul>
        <li><a href="/portal/dashboard"><span class="icon">🏠</span>Home</a></li>
        <li><a href="/portal/brand"><span class="icon">📝</span>Brand</a></li>
        <li><a href="/portal/avatars"><span class="icon">🎭</span>Avtr</a></li>
        <li><a href="/portal/scout"><span class="icon">🔍</span>Scout</a></li>
        <li><a href="/portal/videos" class="on"><span class="icon">🎬</span>Video</a></li>
    </ul>
</nav>

<div class="toast" id="toast"></div>

<script>
(function(){
    'use strict';
    const SB_URL = 'https://rkudnkbpnfxpxglaklqs.supabase.co';
    const SB_KEY = 'sb_publishable_Ll3KUfVgGqeCMUTSlAd4bA_YoD-SHkA';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    let session = null, customerId = null, filter = 'all', tasks = [], loaded = false;
    const main = document.getElementById('main');
    const chipsEl = document.getElementById('chips');
    const countEl = document.getElementById('count');
    const toastEl = document.getElementById('toast');

    // Status → swipe/button config. Only raw_delivered and final_delivered
    // expose actionable buttons per the spec.
    const STATUS = {
        scripted:        {label:'Scripted',          actionable:false},
        rendering:       {label:'Rendering',         actionable:false},
        raw_delivered:   {label:'Ready to review',   actionable:true,
                          approve:{next:'final_delivered', label:'▶ Approve'},
                          reject: {next:'scripted',        label:'✕ Reject'}},
        compositing:     {label:'Compositing',       actionable:false},
        final_delivered: {label:'Ready to publish',  actionable:true,
                          approve:{next:'approved',  label:'▶ Publish'},
                          reject: {next:'scripted',  label:'↺ Rewrite'}},
        approved:        {label:'Approved',          actionable:false},
        published:       {label:'Published',         actionable:false},
        rejected:        {label:'Rejected',          actionable:false},
        failed:          {label:'Failed',            actionable:false},
    };

    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

    // raw_video_url / thumbnail_url stored as bucket-relative paths for private
    // client-uploads bucket. Anything that starts with http(s) is passed through.
    const signCache = new Map();
    async function resolveMedia(path){
        if(!path) return null;
        if(/^https?:\/\//i.test(path)) return path;
        if(signCache.has(path)) return signCache.get(path);
        const {data} = await sb.storage.from('client-uploads').createSignedUrl(path, 3600);
        const url = data?.signedUrl || null;
        if(url) signCache.set(path, url);
        return url;
    }
    function ago(iso){const s=Math.max(1,Math.floor((Date.now()-new Date(iso).getTime())/1000));if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return new Date(iso).toLocaleDateString()}
    function statusClass(s){return 'st-' + (s||'').replace(/[^a-z_]/gi,'')}
    function toast(msg,opts={}){toastEl.textContent=msg;toastEl.classList.toggle('err',!!opts.err);toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),opts.ms||1800)}

    function visibleTasks(){
        if(filter==='all') return tasks.filter(t=>t.status!=='rejected'&&t.status!=='archived');
        return tasks.filter(t=>t.status===filter);
    }

    // Action config per status. Primary is the forward motion (approve/publish),
    // Secondary is always Archive — user can retire anything they don't love.
    // States without explicit primaries show a passive "in progress" label.
    function actionsFor(status){
        const a = [];
        if (status === 'raw_delivered') {
            a.push({kind:'approve', next:'final_delivered', label:'▶ Approve'});
            a.push({kind:'archive', next:'archived',        label:'✕ Archive'});
        } else if (status === 'final_delivered') {
            a.push({kind:'publish', next:'approved',        label:'🚀 Publish'});
            a.push({kind:'rewrite', next:'scripted',        label:'↺ Rewrite'});
            a.push({kind:'archive', next:'archived',        label:'✕ Archive'});
        } else if (status === 'scripted' || status === 'rendering' || status === 'compositing') {
            a.push({kind:'archive', next:'archived',        label:'✕ Archive'});
        } else if (status === 'approved' || status === 'published') {
            a.push({kind:'archive', next:'archived',        label:'✕ Archive'});
        } else if (status === 'failed') {
            a.push({kind:'rewrite', next:'scripted',        label:'↺ Retry'});
            a.push({kind:'archive', next:'archived',        label:'✕ Archive'});
        }
        return a;
    }

    function titleFor(t){
        const first = (t.script_text||'').split('\n')[0].trim();
        return first || '(no script yet)';
    }

    function renderList(){
        const list = visibleTasks();
        countEl.style.display = loaded ? '' : 'none';
        countEl.textContent = list.length;

        if(!loaded){main.innerHTML='<div class="loading"><div class="spin"></div></div>';return}
        if(list.length===0){
            main.innerHTML=`
              <div class="empty">
                <div class="empty-icon">🎬</div>
                <h2>No videos yet</h2>
                <p>Promote a script from your <a href="/portal/scout" style="color:#00ff88">Scout inbox</a> to kick off video production. Rendering takes 3-8 minutes.</p>
              </div>`;
            return;
        }

        main.innerHTML = `<div class="grid">` + list.map(t => {
            const s = STATUS[t.status] || {label:t.status};
            const videoRef = t.final_video_url || t.raw_video_url;
            const posterRef = t.thumbnail_url || '';
            const processing = t.status === 'rendering' || t.status === 'compositing';
            const title = titleFor(t);
            const acts = actionsFor(t.status);
            const playable = Boolean(videoRef);

            const tileInner = `
                ${posterRef ? `<img class="poster" alt="" data-poster-ref="${esc(posterRef)}" loading="lazy">` : `<div class="placeholder">${processing?'⟳':'🎬'}</div>`}
                ${playable ? `<video muted loop playsinline preload="none" data-ref="${esc(videoRef)}"></video>` : ''}
                <span class="pill ${statusClass(t.status)}">${esc(s.label)}</span>
                ${processing ? `<div class="proc-spin"></div>` : ''}
                ${playable ? `<div class="playicon">▶</div>` : ''}
                <div class="meta">
                    <div class="code">${esc(t.task_code||'')}${t.avatar_name ? ' · 🎭 '+esc(t.avatar_name) : ''}</div>
                    <div class="title">${esc(title)}</div>
                    <div class="sub">${ago(t.updated_at||t.created_at)}</div>
                </div>`;

            const actionRow = acts.length ? `<div class="actions">${acts.map(a => `
                <button class="act ${a.kind}" data-act="${a.kind}" data-id="${t.id}" data-next="${a.next}">${a.label}</button>`).join('')}</div>` :
                `<div class="actions"><button class="act passive" disabled>In flight…</button></div>`;

            return `
              <div class="card" data-id="${t.id}">
                <div class="tile" data-id="${t.id}" ${playable ? 'role="button" tabindex="0"' : ''}>${tileInner}</div>
                ${actionRow}
              </div>`;
        }).join('') + `</div>`;

        // Hydrate private-bucket media (posters + video srcs) after DOM is in.
        main.querySelectorAll('img.poster[data-poster-ref]').forEach(async (img) => {
            const url = await resolveMedia(img.dataset.posterRef);
            if (url) img.src = url;
        });
        main.querySelectorAll('video[data-ref]').forEach(async (v) => {
            const url = await resolveMedia(v.dataset.ref);
            if (url) v.src = url;
        });
    }

    chipsEl.addEventListener('click', e=>{
        const c=e.target.closest('.chip'); if(!c) return;
        filter=c.dataset.f;
        Array.from(chipsEl.children).forEach(ch=>ch.classList.toggle('on',ch===c));
        renderList();
    });

    // Desktop: autoplay the video when the tile is hovered. Mobile tap-to-play
    // is handled separately below (no hover events on touch).
    main.addEventListener('mouseover', e => {
        const tile = e.target.closest('.tile'); if (!tile) return;
        const v = tile.querySelector('video[src]'); if (!v) return;
        tile.classList.add('playing');
        v.play().catch(()=>{});
    });
    main.addEventListener('mouseout', e => {
        const tile = e.target.closest('.tile'); if (!tile) return;
        if (tile.contains(e.relatedTarget)) return;
        const v = tile.querySelector('video'); if (!v) return;
        tile.classList.remove('playing');
        v.pause();
        try { v.currentTime = 0; } catch(_) {}
    });
    // Mobile: tap the tile to toggle play/fullscreen.
    main.addEventListener('click', e => {
        const tile = e.target.closest('.tile'); if (!tile) return;
        // Don't hijack clicks on the action row (handled below).
        if (e.target.closest('[data-act]')) return;
        const v = tile.querySelector('video[src]'); if (!v) return;
        if (tile.classList.contains('playing')) {
            v.pause(); tile.classList.remove('playing');
        } else {
            tile.classList.add('playing');
            v.play().catch(()=>{});
            // Open fullscreen on mobile for a real preview
            if (v.requestFullscreen && window.matchMedia('(max-width: 639px)').matches) {
                v.requestFullscreen().catch(()=>{});
            }
        }
    });

    main.addEventListener('click', async e=>{
        const btn = e.target.closest('[data-act]'); if(!btn) return;
        e.stopPropagation();
        const id = Number(btn.dataset.id);
        const next = btn.dataset.next;
        const kind = btn.dataset.act;
        btn.disabled = true;
        const {error} = await sb.from('video_tasks').update({status:next}).eq('id',id);
        if(error){toast('Update failed: '+error.message,{err:true,ms:3000}); btn.disabled=false; return}
        const msg = kind === 'approve' ? 'Approved — on to final ✓'
                  : kind === 'publish' ? 'Publishing 🚀'
                  : kind === 'rewrite' ? 'Sent back for rewrite ↺'
                  : 'Archived ✓';
        toast(msg, {ms:1600});
    });

    (async function boot(){
        const {data:{session:s}} = await sb.auth.getSession();
        if(!s){window.location.replace('/sign-in');return}
        session = s;

        customerId = s.user.user_metadata?.customer_id;
        if(!customerId){
            const {data:c} = await sb.from('customers').select('id').eq('email',s.user.email).maybeSingle();
            customerId = c?.id;
        }
        if(!customerId){main.innerHTML='<div class="err">No customer record for your account.</div>';return}

        async function load(){
            const {data, error} = await sb.from('video_tasks')
                .select('*')
                .eq('customer_id', customerId)
                .order('created_at',{ascending:false})
                .limit(100);
            if(error){main.innerHTML='<div class="err">'+esc(error.message||'Failed to load videos.')+'</div>';return}
            tasks = data||[];
            loaded = true;
            renderList();
        }
        await load();
        sb.channel(`videos-${customerId}`)
          .on('postgres_changes',
              {event:'*',schema:'public',table:'video_tasks',filter:`customer_id=eq.${customerId}`},
              ()=>load())
          .subscribe();
    })();

    if ('serviceWorker' in navigator && location.protocol === 'https:') {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/portal-sw.js', { scope: '/portal/' }).catch(()=>{});
        });
    }
})();
</script>
</body>
</html>
