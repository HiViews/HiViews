<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>HiViews — Alpha Scout</title>
    <meta name="description" content="Your HiViews script inbox — swipe to promote, archive, or review.">
    <meta name="robots" content="noindex, nofollow">

    <!-- PWA-ish -->
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/portal-manifest.json">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind Play CDN (v0 — swap for Vite/PostCSS in v1) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'hv-green': '#00ff88',
              'hv-green-dark': '#00c66a',
              'hv-orange': '#ff8a00',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['"Fira Code"', 'ui-monospace', 'monospace'],
            },
          },
        },
      }
    </script>

    <style>
        html, body { background: #000; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #fff;
            letter-spacing: -0.005em;
            -webkit-font-smoothing: antialiased;
            min-height: 100dvh;
        }
        /* Film grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }
        /* Swipe action reveals */
        .swipe-action-promote { background: #00ff88; color: #000; }
        .swipe-action-archive { background: #ef4444; color: #fff; }
        .pulse-green {
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.6; }
        }
        /* Hide number input spinners */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>

    <!-- Supabase JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <!-- Import map for React (ES modules from esm.sh) -->
    <script type="importmap">
      {
        "imports": {
          "react":              "https://esm.sh/react@18.3.1",
          "react-dom":          "https://esm.sh/react-dom@18.3.1",
          "react-dom/client":   "https://esm.sh/react-dom@18.3.1/client",
          "react-swipeable-list": "https://esm.sh/react-swipeable-list@1.9.3?bundle-deps"
        }
      }
    </script>
    <link rel="stylesheet" href="https://esm.sh/react-swipeable-list@1.9.3/dist/styles.css">
</head>
<body>

<div id="root" class="relative z-10"></div>

<script type="module">
    import React, { useEffect, useState, useCallback, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
        SwipeableList, SwipeableListItem,
        SwipeAction, TrailingActions, LeadingActions,
        Type as ListType,
    } from 'react-swipeable-list';

    const h = React.createElement;

    // ── Supabase config ────────────────────────────────────────────
    const SB_URL = 'https://rkudnkbpnfxpxglaklqs.supabase.co';
    const SB_KEY = 'sb_publishable_Ll3KUfVgGqeCMUTSlAd4bA_YoD-SHkA';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    // ── Helpers ────────────────────────────────────────────────────
    function ago(iso) {
        const s = Math.max(1, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
        if (s < 60)    return s + 's ago';
        if (s < 3600)  return Math.floor(s/60) + 'm ago';
        if (s < 86400) return Math.floor(s/3600) + 'h ago';
        return new Date(iso).toLocaleDateString();
    }
    function hookBadgeClass(t) {
        const m = {
            challenge: 'bg-red-500/15 text-red-400 border-red-500/30',
            question:  'bg-blue-500/15 text-blue-400 border-blue-500/30',
            story:     'bg-purple-500/15 text-purple-400 border-purple-500/30',
            contrast:  'bg-orange-500/15 text-orange-400 border-orange-500/30',
            pattern:   'bg-pink-500/15 text-pink-400 border-pink-500/30',
        };
        return m[t] || 'bg-white/5 text-white/60 border-white/10';
    }
    function statusBadge(s) {
        const m = {
            discovered: { label: 'New',      c: 'text-hv-green' },
            scored:     { label: 'Scored',   c: 'text-hv-green' },
            briefed:    { label: 'Briefed',  c: 'text-blue-400' },
            promoted:   { label: 'Promoted', c: 'text-hv-orange' },
            archived:   { label: 'Archived', c: 'text-white/30' },
        };
        return m[s] || { label: s, c: 'text-white/60' };
    }

    // ── Components ──────────────────────────────────────────────────

    function Nav({ activeTab = 'scout' }) {
        const tabs = [
            { id: 'dashboard', label: 'Home',  icon: '🏠', href: '/portal/dashboard' },
            { id: 'brand',     label: 'Brand', icon: '📝', href: '#', disabled: true },
            { id: 'avatars',   label: 'Avtr',  icon: '🎭', href: '#', disabled: true },
            { id: 'scout',     label: 'Scout', icon: '🔍', href: '/portal/scout' },
            { id: 'videos',    label: 'Video', icon: '🎬', href: '#', disabled: true },
        ];
        return h('nav', {
            className: 'fixed bottom-0 inset-x-0 z-50 bg-black/90 backdrop-blur border-t border-white/10 pb-[env(safe-area-inset-bottom)]',
        },
            h('ul', { className: 'grid grid-cols-5 h-14' },
                tabs.map(t => h('li', { key: t.id, className: 'flex' },
                    h('a', {
                        href: t.disabled ? '#' : t.href,
                        onClick: t.disabled ? (e => e.preventDefault()) : undefined,
                        className: [
                            'flex flex-col items-center justify-center gap-0.5 w-full text-[10px] uppercase tracking-wider',
                            t.id === activeTab ? 'text-hv-green' : t.disabled ? 'text-white/20' : 'text-white/50',
                        ].join(' '),
                    },
                        h('span', { className: 'text-lg leading-none' }, t.icon),
                        h('span', null, t.label),
                    )
                ))
            )
        );
    }

    function ScriptCard({ task }) {
        const s = statusBadge(task.status);
        const preview = (task.script_text || task.title || '').slice(0, 140);
        return h('div', {
            className: 'bg-white/[0.02] border-b border-white/5 px-4 py-3.5',
        },
            h('div', { className: 'flex items-start justify-between gap-3 mb-1.5' },
                h('div', { className: 'flex items-center gap-2 flex-wrap' },
                    h('span', {
                        className: 'font-mono text-[10px] px-2 py-0.5 rounded border ' + hookBadgeClass(task.hook_type)
                    }, (task.hook_type || 'hook').toUpperCase()),
                    h('span', {
                        className: 'font-mono text-[10px] text-white/40'
                    }, 'score ' + (task.score || 0)),
                    h('span', { className: 'font-mono text-[10px] ' + s.c }, s.label),
                ),
                h('span', { className: 'font-mono text-[10px] text-white/30 whitespace-nowrap' },
                    ago(task.created_at)),
            ),
            h('p', { className: 'text-sm text-white/85 leading-snug line-clamp-3' }, preview),
            task.task_code && h('p', { className: 'font-mono text-[10px] text-white/25 mt-2' }, task.task_code),
        );
    }

    function EmptyState({ status, message }) {
        return h('div', {
            className: 'min-h-[60vh] flex flex-col items-center justify-center px-6 text-center',
        },
            h('div', { className: 'text-5xl mb-4 opacity-40' }, '📭'),
            h('h2', { className: 'text-lg font-medium mb-2' }, message || 'No scripts yet'),
            h('p', { className: 'text-sm text-white/50 max-w-xs' },
                'Your overnight scout runs at 2 AM local time. New scripts land here for you to swipe through each morning.'),
        );
    }

    function LoadingState() {
        return h('div', { className: 'min-h-[60vh] flex items-center justify-center' },
            h('div', { className: 'w-6 h-6 border-2 border-white/10 border-t-hv-green rounded-full animate-spin' })
        );
    }

    function App() {
        const [session, setSession] = useState(null);
        const [customerId, setCustomerId] = useState(null);
        const [tasks, setTasks] = useState(null); // null = loading; [] = empty
        const [filter, setFilter] = useState('all');
        const [error, setError] = useState(null);

        // ── Auth gate ────────────────────────────────────────────────
        useEffect(() => {
            (async () => {
                const { data: { session: s } } = await sb.auth.getSession();
                if (!s) {
                    window.location.replace('/sign-in');
                    return;
                }
                setSession(s);
                // Resolve customer_id
                const cidFromMeta = s.user.user_metadata?.customer_id;
                if (cidFromMeta) {
                    setCustomerId(cidFromMeta);
                    return;
                }
                const { data: cust } = await sb
                    .from('customers')
                    .select('id')
                    .eq('email', s.user.email)
                    .maybeSingle();
                if (cust?.id) setCustomerId(cust.id);
                else setError('No customer record found for your account. Please contact support.');
            })();
        }, []);

        // ── Fetch scout_tasks + subscribe to changes ─────────────────
        useEffect(() => {
            if (!customerId) return;

            let channel;
            const load = async () => {
                let q = sb.from('scout_tasks')
                    .select('*')
                    .eq('customer_id', customerId)
                    .order('created_at', { ascending: false })
                    .limit(100);
                if (filter !== 'all') q = q.eq('status', filter);
                const { data, error } = await q;
                if (error) {
                    // PGRST205 = table missing (migration not run). Show friendly message.
                    if (error.code === 'PGRST205') {
                        setError('Portal tables not deployed yet. (Migration pending — check back in a minute.)');
                    } else {
                        setError(error.message);
                    }
                    setTasks([]);
                    return;
                }
                setTasks(data || []);
            };
            load();

            // Realtime: refetch on any change to this customer's scout rows
            channel = sb.channel(`scout-${customerId}`)
                .on('postgres_changes',
                    { event: '*', schema: 'public', table: 'scout_tasks',
                      filter: `customer_id=eq.${customerId}` },
                    () => load())
                .subscribe();

            return () => channel && sb.removeChannel(channel);
        }, [customerId, filter]);

        // ── Actions ─────────────────────────────────────────────────
        const promote = useCallback(async (id) => {
            await sb.from('scout_tasks').update({ status: 'promoted' }).eq('id', id);
            // Fire the promote webhook on the provisioning server (runs the
            // video pipeline on the customer's Droplet). Non-blocking.
            fetch('https://provision.hiviews.ai/api/promote', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ customer_id: customerId, scout_task_id: id }),
            }).catch(() => {});
        }, [customerId]);

        const archive = useCallback(async (id) => {
            await sb.from('scout_tasks').update({ status: 'archived' }).eq('id', id);
        }, []);

        // ── Render ──────────────────────────────────────────────────
        if (error && !tasks) return h('div', { className: 'p-8 text-red-400 text-sm' }, error);
        if (tasks === null) return h(LoadingState);

        const filtered = filter === 'all'
            ? tasks.filter(t => t.status !== 'archived')
            : tasks;

        return h(React.Fragment, null,
            // Header
            h('header', {
                className: 'sticky top-0 z-40 bg-black/90 backdrop-blur border-b border-white/10 px-4 py-3',
            },
                h('div', { className: 'flex items-center justify-between mb-2' },
                    h('div', { className: 'flex items-center gap-2' },
                        h('h1', { className: 'text-lg font-bold tracking-tight' }, 'Alpha Scout'),
                        tasks.length > 0 && h('span', {
                            className: 'text-[10px] font-mono text-hv-green bg-hv-green/10 border border-hv-green/30 px-1.5 py-0.5 rounded',
                        }, filtered.length),
                    ),
                    h('span', { className: 'flex items-center gap-1.5 text-[10px] font-mono text-white/40' },
                        h('span', { className: 'w-1.5 h-1.5 bg-hv-green rounded-full pulse-green' }),
                        'LIVE',
                    ),
                ),
                // Filter chips
                h('div', { className: 'flex gap-1.5 overflow-x-auto -mx-4 px-4' },
                    ['all', 'discovered', 'scored', 'briefed', 'promoted', 'archived'].map(f =>
                        h('button', {
                            key: f,
                            onClick: () => setFilter(f),
                            className: [
                                'whitespace-nowrap px-3 py-1 rounded-full text-[11px] font-medium border transition',
                                filter === f
                                    ? 'bg-hv-green text-black border-hv-green'
                                    : 'border-white/10 text-white/60 hover:border-white/20',
                            ].join(' '),
                        }, f.charAt(0).toUpperCase() + f.slice(1))
                    )
                ),
            ),

            // Error banner (migration not run, etc.)
            error && h('div', {
                className: 'bg-orange-500/10 border-b border-orange-500/30 px-4 py-2 text-xs text-orange-300',
            }, error),

            // List
            h('main', { className: 'pb-20' },
                filtered.length === 0
                    ? h(EmptyState)
                    : h(SwipeableList, {
                        type: ListType.IOS,
                        fullSwipe: true,
                        threshold: 0.4,
                      },
                        filtered.map(task => h(SwipeableListItem, {
                            key: task.id,
                            leadingActions: h(LeadingActions, null,
                                h(SwipeAction, {
                                    onClick: () => promote(task.id),
                                    destructive: true,
                                },
                                    h('div', {
                                        className: 'swipe-action-promote flex items-center justify-center px-6 font-bold text-base',
                                    }, '▶ PROMOTE')
                                )
                            ),
                            trailingActions: h(TrailingActions, null,
                                h(SwipeAction, {
                                    onClick: () => archive(task.id),
                                    destructive: true,
                                },
                                    h('div', {
                                        className: 'swipe-action-archive flex items-center justify-center px-6 font-bold text-base',
                                    }, '✕ ARCHIVE')
                                )
                            ),
                        },
                            h(ScriptCard, { task })
                        ))
                    )
            ),

            h(Nav, { activeTab: 'scout' }),
        );
    }

    createRoot(document.getElementById('root')).render(h(App));

    // PWA service worker — best-effort, never breaks the page.
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/portal-sw.js', { scope: '/portal/' }).catch(() => {});
        });
    }
</script>

</body>
</html>
