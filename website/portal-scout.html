<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>HiViews — Alpha Scout</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/portal-manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{background:#000}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:#fff;letter-spacing:-0.005em;-webkit-font-smoothing:antialiased;min-height:100dvh}
        body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

        /* Header ─────────────────────────────────────────────── */
        .hdr{position:sticky;top:0;z-index:40;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.1);padding:12px 16px}
        .hdr-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
        .hdr h1{font-size:18px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
        .count{font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:#00ff88;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);padding:2px 7px;border-radius:4px}
        .hdr-actions{display:flex;gap:8px;align-items:center}
        .new-btn{background:#00ff88;color:#000;border:0;padding:8px 14px;border-radius:8px;font:600 13px/1 'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px}
        .new-btn:hover{background:#33ff9f}
        .chips{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px}
        .chips::-webkit-scrollbar{display:none}
        .chip{white-space:nowrap;background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);padding:6px 14px;border-radius:100px;font:500 11px/1 'Inter',sans-serif;cursor:pointer;transition:all .12s;user-select:none}
        .chip:hover{border-color:rgba(255,255,255,.25);color:#fff}
        .chip.on{background:#00ff88;color:#000;border-color:#00ff88;font-weight:600}

        /* Compose modal ───────────────────────────────────────── */
        .modal-bg{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
        .modal-bg.show{display:flex;animation:fadeIn .2s ease}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @media(min-width:640px){.modal-bg{align-items:center}}
        .modal{background:#0a0a0a;border:1px solid rgba(255,255,255,.12);border-radius:16px 16px 0 0;max-width:560px;width:100%;max-height:90dvh;display:flex;flex-direction:column;padding:20px;gap:12px;animation:slideUp .24s cubic-bezier(.22,1,.36,1)}
        @media(min-width:640px){.modal{border-radius:16px}}
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .modal h2{font-size:18px;font-weight:700;letter-spacing:-.3px}
        .modal .close{position:absolute;top:14px;right:14px;background:none;border:0;color:rgba(255,255,255,.6);font-size:24px;cursor:pointer;line-height:1;padding:4px;border-radius:6px}
        .modal .close:hover{background:rgba(255,255,255,.06);color:#fff}
        .modal label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.5);font-weight:500;margin-bottom:6px}
        .modal input,.modal textarea{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:8px;padding:11px 13px;font:400 15px/1.5 'Inter',sans-serif;outline:0}
        .modal input:focus,.modal textarea:focus{border-color:rgba(0,255,136,.55);background:rgba(0,255,136,.03)}
        .modal textarea{min-height:160px;max-height:50dvh;resize:vertical;line-height:1.6}
        .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
        .btn-secondary{background:transparent;border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.75);padding:10px 16px;border-radius:8px;font:600 14px/1 'Inter',sans-serif;cursor:pointer}
        .btn-secondary:hover{border-color:rgba(255,255,255,.3);color:#fff}
        .btn-primary{background:#00ff88;color:#000;border:0;padding:10px 18px;border-radius:8px;font:600 14px/1 'Inter',sans-serif;cursor:pointer}
        .btn-primary:hover:not(:disabled){background:#33ff9f}
        .btn-primary:disabled{opacity:.5;cursor:not-allowed}

        /* Inbox ──────────────────────────────────────────────── */
        .wrap{position:relative;z-index:1;padding-bottom:80px}
        .loading{min-height:50vh;display:flex;align-items:center;justify-content:center}
        .spin{width:24px;height:24px;border:2px solid rgba(255,255,255,.1);border-top-color:#00ff88;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Row — email-inbox layout, two lines of text + actions on right */
        .row{position:relative;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:stretch;border-bottom:1px solid rgba(255,255,255,.05);overflow:hidden;transition:background .12s}
        .row:hover{background:rgba(255,255,255,.015)}
        .row.opening{background:rgba(0,255,136,.02)}

        .row-content{padding:14px 16px;min-width:0;cursor:pointer}
        .row-line1{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;min-width:0}
        .row-code{font-family:'Fira Code',ui-monospace,monospace;font-size:11px;color:rgba(255,255,255,.4);font-weight:500;flex-shrink:0}
        .row-title{font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1}
        .row-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .row-status{font-family:'Fira Code',ui-monospace,monospace;font-size:10px}
        .st-discovered{color:#00ff88}.st-scored{color:#00ff88}
        .st-rewriting{color:#ff8a00}
        .st-briefed{color:#60a5fa}
        .st-promoted{color:#ff8a00}
        .st-archived{color:rgba(255,255,255,.3)}
        .row-time{font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,.3);white-space:nowrap}
        .row-line2{font-size:13px;color:rgba(255,255,255,.65);line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .row.expanded .row-line2{white-space:normal;overflow:visible}

        .row-actions{display:flex;align-items:center;padding-right:10px;gap:4px;flex-shrink:0}
        .act{background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);padding:8px 10px;border-radius:8px;font:500 11px/1 'Inter',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .12s;white-space:nowrap;min-width:44px;min-height:44px;justify-content:center}
        .act:hover:not(:disabled){border-color:rgba(255,255,255,.3);color:#fff;background:rgba(255,255,255,.03)}
        .act:disabled{opacity:.5;cursor:not-allowed}
        .act.rewrite:hover:not(:disabled){border-color:rgba(96,165,250,.4);color:#60a5fa;background:rgba(96,165,250,.06)}
        .act.promote:hover:not(:disabled){border-color:rgba(0,255,136,.4);color:#00ff88;background:rgba(0,255,136,.06)}
        .act.archive:hover:not(:disabled){border-color:rgba(239,68,68,.35);color:#f87171;background:rgba(239,68,68,.06)}
        .act .label{display:none}
        @media(min-width:900px){
            .act{padding:8px 14px}
            .act .label{display:inline}
        }

        .badge{font-family:'Fira Code',ui-monospace,monospace;font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid;text-transform:uppercase;letter-spacing:.05em}
        .b-user{background:rgba(0,255,136,.08);color:#00ff88;border-color:rgba(0,255,136,.3)}
        .b-challenge{background:rgba(239,68,68,.1);color:#f87171;border-color:rgba(239,68,68,.3)}
        .b-question{background:rgba(59,130,246,.1);color:#60a5fa;border-color:rgba(59,130,246,.3)}
        .b-story{background:rgba(168,85,247,.1);color:#c084fc;border-color:rgba(168,85,247,.3)}
        .b-contrast{background:rgba(249,115,22,.1);color:#fb923c;border-color:rgba(249,115,22,.3)}
        .b-pattern{background:rgba(236,72,153,.1);color:#f472b6;border-color:rgba(236,72,153,.3)}
        .b-default{background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.1)}

        /* Nav ────────────────────────────────────────────────── */
        .bottomnav{position:fixed;bottom:0;inset-inline:0;z-index:50;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.1);padding-bottom:env(safe-area-inset-bottom)}
        .bottomnav ul{list-style:none;display:grid;grid-template-columns:repeat(5,1fr);height:56px}
        .bottomnav li{display:flex}
        .bottomnav a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:100%;text-decoration:none;font:500 10px/1 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.5)}
        .bottomnav a:hover{color:#fff}
        .bottomnav a.on{color:#00ff88}
        .bottomnav a .icon{font-size:18px}

        .empty{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;text-align:center}
        .empty-icon{font-size:44px;margin-bottom:16px;opacity:.4}
        .empty h2{font-size:16px;font-weight:600;margin-bottom:8px}
        .empty p{font-size:13px;color:rgba(255,255,255,.55);max-width:320px;line-height:1.5;margin-bottom:18px}

        .toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#00ff88;color:#000;padding:10px 20px;border-radius:100px;font:600 13px/1 'Inter',sans-serif;z-index:60;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
        .toast.show{opacity:1;transform:translate(-50%,-6px)}
        .toast.err{background:#f87171;color:#fff}
        .err{background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.3);color:#ff8888;padding:10px 14px;border-radius:10px;font-size:13px;margin:12px 16px}

        @media(max-width:520px){
            .hdr h1{font-size:16px}
            .new-btn{padding:7px 11px;font-size:12px}
            .row-title{font-size:13.5px}
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="hdr">
    <div class="hdr-row">
        <h1>Scripts <span class="count" id="count" style="display:none">0</span></h1>
        <div class="hdr-actions">
            <button class="new-btn" id="newBtn" type="button">＋ <span>Paste Script</span></button>
        </div>
    </div>
    <div class="chips" id="chips">
        <button class="chip on" data-f="all">All</button>
        <button class="chip" data-f="discovered">New</button>
        <button class="chip" data-f="scored">Scored</button>
        <button class="chip" data-f="briefed">Briefed</button>
        <button class="chip" data-f="promoted">Promoted</button>
        <button class="chip" data-f="archived">Archived</button>
    </div>
</header>

<main class="wrap" id="main">
    <div class="loading"><div class="spin"></div></div>
</main>

<nav class="bottomnav">
    <ul>
        <li><a href="/portal/dashboard"><span class="icon">🏠</span>Home</a></li>
        <li><a href="/portal/brand"><span class="icon">📝</span>Brand</a></li>
        <li><a href="/portal/avatars"><span class="icon">🎭</span>Avtr</a></li>
        <li><a href="/portal/scout" class="on"><span class="icon">🔍</span>Scout</a></li>
        <li><a href="/portal/videos"><span class="icon">🎬</span>Video</a></li>
    </ul>
</nav>

<!-- Compose modal (paste a script) -->
<div class="modal-bg" id="modalBg">
    <div class="modal" role="dialog" aria-labelledby="modalTitle">
        <button class="close" id="modalClose" aria-label="Close">×</button>
        <h2 id="modalTitle">Paste a script</h2>
        <p style="font-size:13px;color:rgba(255,255,255,.6);margin-top:-4px">Drop in any raw draft, transcript, or idea. Tap Rewrite on the card after save to have your AI CMO turn it into your brand voice.</p>
        <div>
            <label for="composeTitle">Title (optional)</label>
            <input type="text" id="composeTitle" placeholder="Auto-generated from your first sentence if blank" maxlength="160">
        </div>
        <div>
            <label for="composeBody">Script</label>
            <textarea id="composeBody" placeholder="Paste or type your script here. Every word the avatar will say, nothing else." required></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-secondary" id="modalCancel" type="button">Cancel</button>
            <button class="btn-primary" id="modalSave" type="button">Save to inbox</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
    'use strict';

    const SB_URL = 'https://rkudnkbpnfxpxglaklqs.supabase.co';
    const SB_KEY = 'sb_publishable_Ll3KUfVgGqeCMUTSlAd4bA_YoD-SHkA';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);
    const PROVISION_URL = 'https://provision.hiviews.ai';

    let session = null;
    let customerId = null;
    let filter = 'all';
    let tasks = [];
    let expandedId = null;
    let loaded = false;

    const main = document.getElementById('main');
    const chipsEl = document.getElementById('chips');
    const countEl = document.getElementById('count');
    const toastEl = document.getElementById('toast');
    const newBtn = document.getElementById('newBtn');
    const modalBg = document.getElementById('modalBg');

    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
    function ago(iso){const s=Math.max(1,Math.floor((Date.now()-new Date(iso).getTime())/1000));if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return new Date(iso).toLocaleDateString()}
    function toast(msg,opts={}){toastEl.textContent=msg;toastEl.classList.toggle('err',!!opts.err);toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),opts.ms||1800)}
    function statusClass(s){return 'st-' + (s||'').replace(/[^a-z]/gi,'') }
    function hookClass(h){return 'b-' + ((['user','challenge','question','story','contrast','pattern'].indexOf(h)>=0)?h:'default')}

    // Task code: "A" + 3 alphanumeric, matching skills/shared/task_id.py rules.
    function newTaskCode(){
        const a = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let code = 'A';
        for(let i=0;i<3;i++) code += a[Math.floor(Math.random()*a.length)];
        return code;
    }

    function visibleTasks(){
        if(filter==='all') return tasks.filter(t=>t.status!=='archived');
        return tasks.filter(t=>t.status===filter);
    }

    function titleFor(t){
        if(t.title && t.title.trim()) return t.title.trim();
        const s = (t.script_text||'').trim();
        if(!s) return '(untitled)';
        const first = s.split(/[\.\?!]/)[0] || s;
        return first.length > 80 ? first.slice(0,77)+'…' : first;
    }

    function renderList(){
        const list = visibleTasks();
        countEl.style.display = loaded ? '' : 'none';
        countEl.textContent = list.length;

        if(!loaded){
            main.innerHTML = '<div class="loading"><div class="spin"></div></div>';
            return;
        }
        if(list.length===0){
            main.innerHTML = `
              <div class="empty">
                <div class="empty-icon">📭</div>
                <h2>${filter==='all' ? 'Your inbox is empty' : 'Nothing in this filter'}</h2>
                <p>Drop in a draft with <strong>Paste Script</strong> or wait for tonight's 2&nbsp;AM scout to surface viral trends in your niche.</p>
                ${filter==='all' ? '<button class="btn-primary" id="emptyPaste">＋ Paste your first script</button>' : ''}
              </div>`;
            const ep = document.getElementById('emptyPaste');
            if(ep) ep.addEventListener('click', openCompose);
            return;
        }

        main.innerHTML = list.map(t => {
            const expanded = t.id === expandedId;
            const title = titleFor(t);
            const script = t.script_text || '';
            const isRewriting = t.status === 'rewriting';
            return `
              <div class="row${expanded?' expanded':''}" data-id="${t.id}">
                <div class="row-content" data-toggle="${t.id}">
                  <div class="row-line1">
                    <span class="row-code">${esc(t.task_code||'')}</span>
                    <span class="badge ${hookClass(t.hook_type)}">${esc((t.hook_type||'hook'))}</span>
                    <span class="row-title">${esc(title)}</span>
                    <span class="row-meta">
                      <span class="row-status ${statusClass(t.status)}">${esc(t.status||'')}</span>
                      <span class="row-time">${ago(t.created_at)}</span>
                    </span>
                  </div>
                  <div class="row-line2">${esc(script) || '<em style="color:rgba(255,255,255,.3)">(no script text yet — tap Rewrite)</em>'}</div>
                </div>
                <div class="row-actions">
                  <button class="act rewrite" data-act="rewrite" data-id="${t.id}" ${isRewriting?'disabled':''} title="Rewrite in brand voice">
                    <span>${isRewriting?'⋯':'🔄'}</span><span class="label">Rewrite</span>
                  </button>
                  <button class="act promote" data-act="promote" data-id="${t.id}" title="Promote to video production">
                    <span>▶</span><span class="label">Promote</span>
                  </button>
                  <button class="act archive" data-act="archive" data-id="${t.id}" title="Archive">
                    <span>✕</span><span class="label">Archive</span>
                  </button>
                </div>
              </div>`;
        }).join('');
    }

    // Event delegation
    chipsEl.addEventListener('click', e => {
        const c = e.target.closest('.chip');
        if(!c) return;
        filter = c.dataset.f;
        Array.from(chipsEl.children).forEach(ch => ch.classList.toggle('on', ch===c));
        renderList();
    });

    main.addEventListener('click', async e => {
        // Expand/collapse row
        const toggleEl = e.target.closest('[data-toggle]');
        if(toggleEl && !e.target.closest('[data-act]')){
            const id = Number(toggleEl.dataset.toggle);
            expandedId = (expandedId===id) ? null : id;
            renderList();
            return;
        }
        // Action buttons
        const btn = e.target.closest('[data-act]');
        if(!btn) return;
        e.stopPropagation();
        const id = Number(btn.dataset.id);
        const act = btn.dataset.act;
        const task = tasks.find(t=>t.id===id);
        if(!task) return;

        btn.disabled = true;
        if(act==='archive'){
            const { error } = await sb.from('scout_tasks').update({status:'archived'}).eq('id',id);
            if(error){toast('Archive failed: '+error.message,{err:true,ms:3000});btn.disabled=false;return}
            toast('Archived',{ms:1200});
        }
        else if(act==='promote'){
            const { error } = await sb.from('scout_tasks').update({status:'promoted'}).eq('id',id);
            if(error){toast('Promote failed: '+error.message,{err:true,ms:3000});btn.disabled=false;return}
            if(session){
                fetch(`${PROVISION_URL}/api/promote`,{
                    method:'POST',
                    headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
                    body:JSON.stringify({customer_id:customerId,scout_task_id:id}),
                }).catch(()=>{});
            }
            toast('Promoted — video production starting ✓',{ms:2400});
        }
        else if(act==='rewrite'){
            // Immediately flip status so the UI shows progress + disables the button.
            const { error: uerr } = await sb.from('scout_tasks').update({status:'rewriting'}).eq('id',id);
            if(uerr){toast('Rewrite failed: '+uerr.message,{err:true,ms:3000});btn.disabled=false;return}
            if(!session){toast('Sign-in required',{err:true,ms:3000});return}
            try{
                const r = await fetch(`${PROVISION_URL}/api/rewrite`,{
                    method:'POST',
                    headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
                    body:JSON.stringify({customer_id:customerId,scout_task_id:id}),
                });
                if(!r.ok){
                    const j = await r.json().catch(()=>({}));
                    toast('Rewrite trigger failed: '+(j.error||r.status),{err:true,ms:3500});
                    // Roll status back so user can retry.
                    await sb.from('scout_tasks').update({status:task.status||'discovered'}).eq('id',id);
                    return;
                }
                toast('Rewriting in your brand voice…',{ms:2400});
            }catch(err){
                toast('Network error',{err:true,ms:3000});
                await sb.from('scout_tasks').update({status:task.status||'discovered'}).eq('id',id);
            }
        }
    });

    // ── Compose flow ────────────────────────────────────────────────
    function openCompose(){
        modalBg.classList.add('show');
        setTimeout(()=>document.getElementById('composeBody').focus(),80);
    }
    function closeCompose(){
        modalBg.classList.remove('show');
        document.getElementById('composeTitle').value='';
        document.getElementById('composeBody').value='';
    }
    newBtn.addEventListener('click', openCompose);
    document.getElementById('modalClose').addEventListener('click', closeCompose);
    document.getElementById('modalCancel').addEventListener('click', closeCompose);
    modalBg.addEventListener('click', e => { if(e.target===modalBg) closeCompose(); });
    document.addEventListener('keydown', e => { if(e.key==='Escape' && modalBg.classList.contains('show')) closeCompose(); });

    document.getElementById('modalSave').addEventListener('click', async () => {
        const titleEl = document.getElementById('composeTitle');
        const bodyEl  = document.getElementById('composeBody');
        const saveBtn = document.getElementById('modalSave');
        const body = (bodyEl.value||'').trim();
        if(!body){ bodyEl.focus(); return; }
        let title = (titleEl.value||'').trim();
        if(!title) title = (body.split(/[\.\?!\n]/)[0] || body).slice(0,120);

        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving…';

        const row = {
            customer_id: customerId,
            task_code: newTaskCode(),
            status: 'discovered',
            title: title,
            script_text: body,
            hook_type: 'user',
            source: 'user',
            score: 0,
            hook_text: body.split(/\s+/).slice(0,12).join(' '),
        };
        const { error } = await sb.from('scout_tasks').insert(row);
        if(error){
            toast('Save failed: '+error.message,{err:true,ms:4000});
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save to inbox';
            return;
        }
        closeCompose();
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save to inbox';
        toast('Saved — tap Rewrite to brand-voice it ✓',{ms:2200});
    });

    // ── Boot ─────────────────────────────────────────────────────────
    (async function boot(){
        const { data: { session: s } } = await sb.auth.getSession();
        if(!s){window.location.replace('/sign-in');return}
        session = s;

        customerId = s.user.user_metadata?.customer_id;
        if(!customerId){
            const { data: c } = await sb.from('customers').select('id').eq('email',s.user.email).maybeSingle();
            customerId = c?.id;
        }
        if(!customerId){
            main.innerHTML = '<div class="err">No customer record for your account. Contact support@hiviews.ai.</div>';
            return;
        }

        async function load(){
            const { data, error } = await sb.from('scout_tasks')
                .select('*')
                .eq('customer_id', customerId)
                .order('created_at', { ascending: false })
                .limit(200);
            if(error){
                main.innerHTML = '<div class="err">'+esc(error.message||'Failed to load scripts.')+'</div>';
                return;
            }
            tasks = data||[];
            loaded = true;
            renderList();
        }
        await load();

        sb.channel(`scout-${customerId}`)
          .on('postgres_changes',
              { event:'*', schema:'public', table:'scout_tasks', filter:`customer_id=eq.${customerId}` },
              () => load())
          .subscribe();
    })();

    if ('serviceWorker' in navigator && location.protocol === 'https:') {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/portal-sw.js', { scope: '/portal/' }).catch(() => {});
        });
    }
})();
</script>
