<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>HiViews — Alpha Scout</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/portal-manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{background:#000}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:#fff;letter-spacing:-0.005em;-webkit-font-smoothing:antialiased;min-height:100dvh}
        body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

        /* Header ─────────────────────────────────────────────── */
        .hdr{position:sticky;top:0;z-index:40;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.1);padding:12px 16px}
        .hdr-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
        .hdr h1{font-size:18px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
        .count{font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:#00ff88;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);padding:2px 7px;border-radius:4px}
        .live{display:flex;align-items:center;gap:6px;font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,.4)}
        .live .dot{width:6px;height:6px;background:#00ff88;border-radius:50%;animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .chips{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px}
        .chips::-webkit-scrollbar{display:none}
        .chip{white-space:nowrap;background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);padding:6px 14px;border-radius:100px;font:500 11px/1 'Inter',sans-serif;cursor:pointer;transition:all .12s;user-select:none}
        .chip:hover{border-color:rgba(255,255,255,.25);color:#fff}
        .chip.on{background:#00ff88;color:#000;border-color:#00ff88;font-weight:600}

        /* Layout ─────────────────────────────────────────────── */
        .wrap{position:relative;z-index:1;padding-bottom:80px}
        .loading{min-height:50vh;display:flex;align-items:center;justify-content:center}
        .spin{width:24px;height:24px;border:2px solid rgba(255,255,255,.1);border-top-color:#00ff88;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Card ───────────────────────────────────────────────── */
        .card{background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.05);padding:14px 16px;cursor:pointer;transition:background .12s}
        .card:hover{background:rgba(255,255,255,.03)}
        .card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;flex-wrap:wrap}
        .badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
        .badge{font-family:'Fira Code',ui-monospace,monospace;font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid}
        .b-challenge{background:rgba(239,68,68,.1);color:#f87171;border-color:rgba(239,68,68,.3)}
        .b-question{background:rgba(59,130,246,.1);color:#60a5fa;border-color:rgba(59,130,246,.3)}
        .b-story{background:rgba(168,85,247,.1);color:#c084fc;border-color:rgba(168,85,247,.3)}
        .b-contrast{background:rgba(249,115,22,.1);color:#fb923c;border-color:rgba(249,115,22,.3)}
        .b-pattern{background:rgba(236,72,153,.1);color:#f472b6;border-color:rgba(236,72,153,.3)}
        .b-user{background:rgba(0,255,136,.08);color:#00ff88;border-color:rgba(0,255,136,.3)}
        .b-default{background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.1)}
        .score{font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,.5)}
        .status{font-family:'Fira Code',ui-monospace,monospace;font-size:10px}
        .st-discovered,.st-scored{color:#00ff88}
        .st-briefed{color:#60a5fa}
        .st-promoted{color:#ff8a00}
        .st-archived{color:rgba(255,255,255,.3)}
        .time{font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,.3);white-space:nowrap}

        .preview{font-size:14px;color:rgba(255,255,255,.85);line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
        .card.open .preview{display:block;-webkit-line-clamp:unset}
        .task-code{font-family:'Fira Code',ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,.25);margin-top:8px}
        .avatar-note{font-style:italic;color:rgba(255,255,255,.5);font-size:13px;margin-top:8px}

        /* Expanded actions ────────────────────────────────────── */
        .actions{display:none;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
        .card.open .actions{display:grid}
        .btn{padding:12px 14px;border:0;border-radius:8px;font:600 14px/1 'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .btn-promote{background:#00ff88;color:#000}
        .btn-promote:hover:not(:disabled){background:#33ff9f}
        .btn-archive{background:rgba(255,68,68,.12);color:#f87171;border:1px solid rgba(255,68,68,.3)}
        .btn-archive:hover:not(:disabled){background:rgba(255,68,68,.2)}

        /* Nav ────────────────────────────────────────────────── */
        .bottomnav{position:fixed;bottom:0;inset-inline:0;z-index:50;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.1);padding-bottom:env(safe-area-inset-bottom)}
        .bottomnav ul{list-style:none;display:grid;grid-template-columns:repeat(5,1fr);height:56px}
        .bottomnav li{display:flex}
        .bottomnav a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:100%;text-decoration:none;font:500 10px/1 'Inter',sans-serif;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.5)}
        .bottomnav a:hover{color:#fff}
        .bottomnav a.on{color:#00ff88}
        .bottomnav a .icon{font-size:18px}

        .empty{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;text-align:center}
        .empty-icon{font-size:44px;margin-bottom:16px;opacity:.4}
        .empty h2{font-size:16px;font-weight:600;margin-bottom:8px}
        .empty p{font-size:13px;color:rgba(255,255,255,.5);max-width:300px;line-height:1.5}

        .toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#00ff88;color:#000;padding:10px 20px;border-radius:100px;font:600 13px/1 'Inter',sans-serif;z-index:60;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
        .toast.show{opacity:1;transform:translate(-50%,-6px)}
        .err{background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.3);color:#ff8888;padding:10px 14px;border-radius:10px;font-size:13px;margin:12px 16px}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="hdr">
    <div class="hdr-row">
        <h1>Alpha Scout <span class="count" id="count" style="display:none">0</span></h1>
        <span class="live"><span class="dot"></span>LIVE</span>
    </div>
    <div class="chips" id="chips">
        <button class="chip on" data-f="all">All</button>
        <button class="chip" data-f="discovered">New</button>
        <button class="chip" data-f="scored">Scored</button>
        <button class="chip" data-f="briefed">Briefed</button>
        <button class="chip" data-f="promoted">Promoted</button>
        <button class="chip" data-f="archived">Archived</button>
    </div>
</header>

<main class="wrap" id="main">
    <div class="loading"><div class="spin"></div></div>
</main>

<nav class="bottomnav">
    <ul>
        <li><a href="/portal/dashboard"><span class="icon">🏠</span>Home</a></li>
        <li><a href="/portal/brand"><span class="icon">📝</span>Brand</a></li>
        <li><a href="/portal/avatars"><span class="icon">🎭</span>Avtr</a></li>
        <li><a href="/portal/scout" class="on"><span class="icon">🔍</span>Scout</a></li>
        <li><a href="/portal/videos"><span class="icon">🎬</span>Video</a></li>
    </ul>
</nav>

<div class="toast" id="toast"></div>

<script>
(function(){
    'use strict';

    const SB_URL = 'https://rkudnkbpnfxpxglaklqs.supabase.co';
    const SB_KEY = 'sb_publishable_Ll3KUfVgGqeCMUTSlAd4bA_YoD-SHkA';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    let session = null;
    let customerId = null;
    let filter = 'all';
    let tasks = [];
    let openId = null;
    let loaded = false;

    const main = document.getElementById('main');
    const chipsEl = document.getElementById('chips');
    const countEl = document.getElementById('count');
    const toastEl = document.getElementById('toast');

    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
    function ago(iso){const s=Math.max(1,Math.floor((Date.now()-new Date(iso).getTime())/1000));if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return new Date(iso).toLocaleDateString()}
    function toast(msg,ms=1800){toastEl.textContent=msg;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),ms)}

    function statusClass(s){return 'st-' + (s||'').replace(/[^a-z]/gi,'') }
    function statusLabel(s){return {discovered:'New',scored:'Scored',briefed:'Briefed',promoted:'Promoted',archived:'Archived'}[s]||s}
    function hookClass(h){return 'b-' + ((['challenge','question','story','contrast','pattern','user'].indexOf(h)>=0)?h:'default')}

    function visibleTasks(){
        if(filter==='all') return tasks.filter(t=>t.status!=='archived');
        return tasks.filter(t=>t.status===filter);
    }

    function render(){
        const list = visibleTasks();
        countEl.style.display = loaded ? '' : 'none';
        countEl.textContent = list.length;

        if(!loaded){
            main.innerHTML = '<div class="loading"><div class="spin"></div></div>';
            return;
        }
        if(list.length===0){
            main.innerHTML = `
              <div class="empty">
                <div class="empty-icon">📭</div>
                <h2>No scripts yet</h2>
                <p>Your overnight scout runs at 2 AM local time and drops new scripts here. Fill in your niche under <a href="/portal/brand" style="color:#00ff88">Brand</a> so it knows what to look for.</p>
              </div>`;
            return;
        }

        main.innerHTML = list.map(t => {
            const isOpen = t.id === openId;
            const preview = t.script_text || t.title || '';
            const note = t.avatar_note ? `<div class="avatar-note">${esc(t.avatar_note)}</div>` : '';
            return `
              <div class="card${isOpen?' open':''}" data-id="${t.id}">
                <div class="card-head">
                  <div class="badges">
                    <span class="badge ${hookClass(t.hook_type)}">${esc((t.hook_type||'hook').toUpperCase())}</span>
                    <span class="score">score ${t.score||0}</span>
                    <span class="status ${statusClass(t.status)}">${esc(statusLabel(t.status))}</span>
                  </div>
                  <span class="time">${ago(t.created_at)}</span>
                </div>
                <div class="preview">${esc(preview)}</div>
                ${isOpen ? note : ''}
                <div class="task-code">${esc(t.task_code||'')}</div>
                <div class="actions">
                  <button class="btn btn-promote" data-act="promote" data-id="${t.id}">▶ Promote</button>
                  <button class="btn btn-archive" data-act="archive" data-id="${t.id}">✕ Archive</button>
                </div>
              </div>`;
        }).join('');

        // Wire event delegation (one handler at the parent)
    }

    // Event delegation — handle chip filters, card expand, and action buttons.
    chipsEl.addEventListener('click', e => {
        const c = e.target.closest('.chip');
        if(!c) return;
        filter = c.dataset.f;
        Array.from(chipsEl.children).forEach(ch => ch.classList.toggle('on', ch===c));
        render();
    });

    main.addEventListener('click', async e => {
        const actBtn = e.target.closest('[data-act]');
        if(actBtn){
            e.stopPropagation();
            const id = Number(actBtn.dataset.id);
            const act = actBtn.dataset.act;
            actBtn.disabled = true;
            if(act==='promote'){
                actBtn.textContent = 'Promoting…';
                const { error } = await sb.from('scout_tasks').update({status:'promoted'}).eq('id',id);
                if(error){toast('Update failed: '+error.message,3000);actBtn.disabled=false;actBtn.innerHTML='▶ Promote';return}
                // Fire webhook to kick the Droplet's rewrite pipeline.
                if(session){
                    fetch('https://provision.hiviews.ai/api/promote',{
                        method:'POST',
                        headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
                        body:JSON.stringify({customer_id:customerId,scout_task_id:id}),
                    }).catch(()=>{});
                }
                toast('Promoted — video production starting ✓',2400);
            } else if(act==='archive'){
                actBtn.textContent = 'Archiving…';
                const { error } = await sb.from('scout_tasks').update({status:'archived'}).eq('id',id);
                if(error){toast('Update failed: '+error.message,3000);actBtn.disabled=false;actBtn.innerHTML='✕ Archive';return}
                toast('Archived',1200);
            }
            return;
        }
        // Tap card to toggle expanded
        const card = e.target.closest('.card');
        if(card){
            const id = Number(card.dataset.id);
            openId = (openId===id) ? null : id;
            render();
        }
    });

    // Auth gate + load + realtime ────────────────────────────────────
    (async function boot(){
        const { data: { session: s } } = await sb.auth.getSession();
        if(!s){window.location.replace('/sign-in');return}
        session = s;

        customerId = s.user.user_metadata?.customer_id;
        if(!customerId){
            const { data: c } = await sb.from('customers').select('id').eq('email',s.user.email).maybeSingle();
            customerId = c?.id;
        }
        if(!customerId){
            main.innerHTML = '<div class="err">No customer record found for your account. Contact support@hiviews.ai.</div>';
            return;
        }

        async function load(){
            const { data, error } = await sb.from('scout_tasks')
                .select('*')
                .eq('customer_id', customerId)
                .order('created_at', { ascending: false })
                .limit(200);
            if(error){
                main.innerHTML = '<div class="err">'+esc(error.message||'Failed to load scripts.')+'</div>';
                return;
            }
            tasks = data||[];
            loaded = true;
            render();
        }
        await load();

        // Realtime: any change to this customer's rows → reload
        sb.channel(`scout-${customerId}`)
          .on('postgres_changes',
              { event:'*', schema:'public', table:'scout_tasks', filter:`customer_id=eq.${customerId}` },
              () => load())
          .subscribe();
    })();

    // PWA (defensive — never throws)
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/portal-sw.js', { scope: '/portal/' }).catch(() => {});
        });
    }
})();
</script>

</body>
</html>
