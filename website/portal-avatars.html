<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>HiViews — Avatars</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/portal-manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { 'hv-green':'#00ff88','hv-orange':'#ff8a00' }, fontFamily: { sans:['Inter','system-ui','sans-serif'], mono:['"Fira Code"','ui-monospace','monospace'] } } } }
    </script>
    <style>
        html,body{background:#000}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:#fff;letter-spacing:-0.005em;-webkit-font-smoothing:antialiased;min-height:100dvh}
        body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
        .pulse-green{animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
        .saved-toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:#00ff88;color:#000;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;z-index:60;animation:slideUp 0.3s ease-out}
        @keyframes slideUp{from{transform:translate(-50%,20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
        .drop-zone{border:1px dashed rgba(255,255,255,0.15);border-radius:12px;transition:all 0.2s}
        .drop-zone.active{border-color:rgba(0,255,136,0.5);background:rgba(0,255,136,0.04)}

        /* Stock avatar browse grid — HeyGen UGC catalog, hover-autoplay */
        .stk-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
        @media (min-width:640px){.stk-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}}
        @media (min-width:960px){.stk-grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}}
        .stk-tile{position:relative;aspect-ratio:9/16;border-radius:14px;overflow:hidden;background:#0a0a0a;border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:transform .18s cubic-bezier(.2,.7,.2,1),border-color .18s,box-shadow .18s}
        .stk-tile:hover{border-color:rgba(0,255,136,.5);box-shadow:0 8px 32px -8px rgba(0,255,136,.25)}
        @media (min-width:640px){.stk-tile:hover{transform:scale(1.03)}}
        .stk-tile img,.stk-tile video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:#0a0a0a}
        .stk-tile video{z-index:1;opacity:0;transition:opacity .2s}
        .stk-tile.playing video{opacity:1}
        .stk-tile .meta{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:22px 10px 9px;background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,.4) 60%,transparent);pointer-events:none}
        .stk-tile .meta .n{font:700 13px/1.1 Inter,sans-serif;color:#fff}
        .stk-tile .meta .g{font:500 10px/1 "Fira Code",ui-monospace,monospace;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
        .stk-tile.on-roster{border-color:rgba(0,255,136,.6)}
        .stk-tile.on-roster .meta::after{content:'✓ on your roster';display:block;color:#00ff88;font:700 10px/1 "Fira Code",ui-monospace,monospace;text-transform:uppercase;letter-spacing:.08em;margin-top:4px}

        /* Avatar detail popup — shared by roster cards + stock tiles */
        .apop-back{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;animation:apFade .15s ease}
        @keyframes apFade{from{opacity:0}to{opacity:1}}
        .apop{background:#0a0a0a;border:1px solid rgba(255,255,255,.12);border-radius:16px 16px 0 0;width:100%;max-width:100%;max-height:92dvh;display:flex;flex-direction:column;position:relative;animation:apSlide .2s cubic-bezier(.22,1,.36,1);overflow:hidden}
        @keyframes apSlide{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
        @media (min-width:640px){.apop-back{align-items:center}.apop{max-width:540px;max-height:85vh;border-radius:16px}.apop-handle{display:none}}
        .apop-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px auto 4px;flex-shrink:0}
        .apop-close{position:absolute;top:12px;right:14px;background:rgba(0,0,0,.5);border:0;color:#fff;font-size:18px;cursor:pointer;padding:6px 10px;border-radius:6px;line-height:1;z-index:3;backdrop-filter:blur(6px)}
        .apop-close:hover{background:rgba(0,0,0,.75)}
        .apop-media{position:relative;background:#000;width:100%;aspect-ratio:9/16;max-height:45vh;overflow:hidden;flex-shrink:0}
        .apop-media img,.apop-media video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;display:block}
        .apop-media .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:56px;opacity:.3}
        .apop-body{padding:18px 20px 22px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
        .apop-id{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font:500 12px/1 "Fira Code",ui-monospace,monospace;color:rgba(255,255,255,.55)}
        .apop-id .n{color:#00ff88;font-weight:800;font-size:14px}
        .apop-title{font:700 18px/1.25 Inter,sans-serif;color:#fff;margin-top:8px;letter-spacing:-.2px}
        .apop-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;font:500 10px/1 "Fira Code",ui-monospace,monospace;color:rgba(255,255,255,.45)}
        .apop-meta .sep{color:rgba(255,255,255,.2)}
        .apop-voice{display:flex;align-items:center;gap:8px;margin-top:14px;padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px;font:500 12px/1.3 Inter,sans-serif}
        .apop-voice .lbl{font-family:"Fira Code",ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-right:4px}
        .apop-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
        .apop-act{flex:1;min-width:120px;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.8);font:600 13px/1 Inter,sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;min-height:46px;transition:all .12s}
        .apop-act:hover:not(:disabled){border-color:rgba(255,255,255,.3);color:#fff;background:rgba(255,255,255,.03)}
        .apop-act:disabled{opacity:.5;cursor:not-allowed}
        .apop-act.primary{background:#00ff88;color:#000;border-color:#00ff88}
        .apop-act.primary:hover:not(:disabled){background:#33ff9f}
        .apop-act.danger{background:rgba(239,68,68,.08);color:#f87171;border-color:rgba(239,68,68,.25)}
        .apop-act.danger:hover:not(:disabled){background:rgba(239,68,68,.15);color:#fca5a5}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script type="importmap">
      {"imports":{"react":"https://esm.sh/react@18.3.1","react-dom":"https://esm.sh/react-dom@18.3.1","react-dom/client":"https://esm.sh/react-dom@18.3.1/client"}}
    </script>
</head>
<body>
<div id="root" class="relative z-10"></div>
<script type="module">
    import React,{useEffect,useState,useCallback,useRef} from 'react';
    import {createRoot} from 'react-dom/client';
    const h=React.createElement;

    const SB_URL='https://rkudnkbpnfxpxglaklqs.supabase.co';
    const SB_KEY='sb_publishable_Ll3KUfVgGqeCMUTSlAd4bA_YoD-SHkA';
    const sb=window.supabase.createClient(SB_URL,SB_KEY);
    const BUCKET='client-uploads'; // must exist in Supabase Storage (see punchlist)

    function ago(iso){if(!iso)return'';const s=Math.max(1,Math.floor((Date.now()-new Date(iso).getTime())/1000));if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return new Date(iso).toLocaleDateString()}

    function Nav(){
        const tabs=[
            {id:'dashboard',label:'Home',icon:'🏠',href:'/portal/dashboard'},
            {id:'brand',label:'Brand',icon:'📝',href:'/portal/brand'},
            {id:'avatars',label:'Avtr',icon:'🎭',href:'/portal/avatars'},
            {id:'scout',label:'Scout',icon:'🔍',href:'/portal/scout'},
            {id:'videos',label:'Video',icon:'🎬',href:'/portal/videos'},
        ];
        return h('nav',{className:'fixed bottom-0 inset-x-0 z-50 bg-black/90 backdrop-blur border-t border-white/10 pb-[env(safe-area-inset-bottom)]'},
            h('ul',{className:'grid grid-cols-5 h-14'},
                tabs.map(t=>h('li',{key:t.id,className:'flex'},
                    h('a',{href:t.href,className:['flex flex-col items-center justify-center gap-0.5 w-full text-[10px] uppercase tracking-wider',t.id==='avatars'?'text-hv-green':'text-white/50'].join(' ')},
                        h('span',{className:'text-lg leading-none'},t.icon),
                        h('span',null,t.label))))));
    }

    const STATUS={
        pending:  {label:'Pending',  c:'text-white/50'},
        training: {label:'Training', c:'text-hv-orange'},
        ready:    {label:'Ready',    c:'text-hv-green'},
        failed:   {label:'Failed',   c:'text-red-400'},
    };

    const VOICE_STATUS = {
        none:    {label:'No voice clone',       c:'text-white/35'},
        pending: {label:'Cloning voice…',       c:'text-hv-orange'},
        ready:   {label:'Voice ready',          c:'text-hv-green'},
        failed:  {label:'Clone failed — retry', c:'text-red-400'},
        stuck:   {label:'Clone stuck — retry',  c:'text-red-400'},
    };

    // A "pending" voice clone should finish in ~1 minute. If a row is
    // still pending after 10 minutes, treat it as stuck and show the
    // retry affordance instead of an infinite spinner. Belt-and-suspenders
    // for silent-failure modes on the droplet.
    function effectiveVoiceStatus(avatar){
        const s = avatar.voice_status || 'none';
        if (s !== 'pending') return s;
        const updated = new Date(avatar.updated_at || avatar.created_at || Date.now()).getTime();
        if (Date.now() - updated > 10 * 60 * 1000) return 'stuck';
        return 'pending';
    }

    function AvatarCard({avatar, onSetDefault, onUploadVoice, voiceUploading, onDelete, onOpen, customerPlan, thumbSrc}){
        const s=STATUS[avatar.status]||{label:avatar.status,c:'text-white/60'};
        const effVoice = effectiveVoiceStatus(avatar);
        const vs = VOICE_STATUS[effVoice] || VOICE_STATUS.none;
        const voiceStuck = effVoice === 'stuck' || effVoice === 'failed';
        const canClone = customerPlan === 'dominate' || customerPlan === 'special_ops';
        const num = avatar.display_number;
        // Row tap opens the popup. Action-button clicks stop propagation in
        // their own handlers so they don't also open the popup.
        const handleCardClick = e => {
            if (e.target.closest('button') || e.target.closest('label') || e.target.closest('input')) return;
            onOpen && onOpen(avatar);
        };
        return h('div',{
            onClick: handleCardClick,
            className:'bg-white/[0.02] border border-white/10 rounded-xl p-4 flex gap-3 items-start relative cursor-pointer hover:border-white/20 transition',
        },
            // Big #N badge — the client-facing identifier so they can say
            // "use avatar #3" in Telegram and the agent routes correctly.
            h('div',{className:'flex flex-col items-center justify-center w-12 shrink-0 mt-0.5'},
                h('div',{className:'font-mono text-[10px] text-white/35 leading-none mb-0.5'},'AVT'),
                h('div',{className:'font-mono text-2xl font-black leading-none '+(avatar.is_default?'text-hv-green':'text-white/80')},
                    num ? ('#'+num) : '—'),
            ),
            thumbSrc
                ?h('img',{src:thumbSrc,alt:avatar.name,className:'w-14 h-14 rounded-lg object-cover bg-black/40',loading:'lazy',referrerPolicy:'no-referrer'})
                :h('div',{className:'w-14 h-14 rounded-lg bg-white/5 flex items-center justify-center text-2xl shrink-0'},'🎭'),
            h('div',{className:'flex-1 min-w-0'},
                h('div',{className:'flex items-center gap-2 mb-1 flex-wrap'},
                    h('span',{className:'text-sm font-semibold'},avatar.name||'Unnamed'),
                    h('span',{className:'font-mono text-[10px] '+s.c},s.label),
                    avatar.is_default&&h('span',{className:'font-mono text-[10px] text-hv-green'},'DEFAULT'),
                ),
                h('div',{className:'text-[11px] text-white/40 font-mono'},
                    (avatar.type||'photo')+' · '+((avatar.source_files||[]).length)+' file'+((avatar.source_files||[]).length===1?'':'s')+' · '+ago(avatar.created_at)),
                // Voice status row
                h('div',{className:'text-[11px] mt-1 flex items-center gap-2 flex-wrap'},
                    h('span',{className:'font-mono '+vs.c},'🎙 '+vs.label),
                    avatar.voice_name && h('span',{className:'text-white/35'},'· '+avatar.voice_name),
                ),
                h('div',{className:'mt-2 flex gap-3 flex-wrap items-center'},
                    !avatar.is_default&&avatar.status==='ready'&&h('button',{
                        onClick:()=>onSetDefault(avatar.id),
                        className:'text-[11px] text-white/60 hover:text-hv-green underline',
                    },'Set as default'),
                    // Show upload label when: clone is not actively running
                    // (not a fresh 'pending'), or is stuck/failed/ready. We
                    // key off `effVoice`, not raw voice_status, so a row
                    // that's been pending for >10 min is still retryable.
                    canClone && effVoice !== 'pending' && h('label',{
                        className:'text-[11px] '+(voiceUploading
                            ?'text-white/30 cursor-wait'
                            :(voiceStuck?'text-red-400 hover:text-red-300 underline cursor-pointer'
                                        :'text-white/60 hover:text-hv-green underline cursor-pointer')),
                    },
                        voiceUploading ? 'Uploading voice…' :
                        (effVoice === 'ready' ? 'Replace voice sample'
                          : voiceStuck ? 'Retry voice clone'
                          : 'Upload voice sample'),
                        h('input',{
                            type:'file',accept:'audio/*',className:'hidden',
                            disabled: voiceUploading,
                            onChange:e=>onUploadVoice(avatar, e.target.files?.[0]),
                        }),
                    ),
                    !canClone && h('span',{
                        className:'text-[11px] text-white/30',
                        title:'Voice cloning is available on Dominate and Special Ops plans.',
                    },'🔒 Voice clone (Dominate+)'),
                    h('button',{
                        onClick: () => onDelete(avatar),
                        className: 'text-[11px] text-white/40 hover:text-red-400 underline ml-auto',
                        title: 'Delete this avatar. To refresh the face or voice, delete and re-upload.',
                    }, 'Delete'),
                )));
    }

    // Browse HeyGen's public UGC catalog. Pulls from /api/public-avatars
    // once on mount (server-side 1h cache, ~50 items). Hover-autoplays the
    // HeyGen preview video; tap picks the avatar and adds it to the roster.
    function StockAvatarBrowse({ onPick, adding, rosterEngineIds }){
        const [loaded, setLoaded] = useState(false);
        const [items, setItems] = useState([]);
        const [gender, setGender] = useState('');
        const [error, setError] = useState(null);

        useEffect(()=>{
            let cancelled = false;
            fetch('https://provision.hiviews.ai/api/public-avatars')
                .then(r => r.json())
                .then(j => { if (!cancelled) { setItems(j.avatars || []); setLoaded(true); }})
                .catch(e => { if (!cancelled) { setError(e.message||'Failed'); setLoaded(true); }});
            return ()=>{ cancelled = true; };
        }, []);

        const visible = gender
            ? items.filter(a => (a.gender||'').toLowerCase() === gender.toLowerCase())
            : items;

        // Hover autoplay (desktop) — same pattern as portal-videos tiles
        function onEnter(e){
            const tile = e.currentTarget;
            const v = tile.querySelector('video');
            if (v) { tile.classList.add('playing'); v.play().catch(()=>{}); }
        }
        function onLeave(e){
            const tile = e.currentTarget;
            const v = tile.querySelector('video');
            if (v) { tile.classList.remove('playing'); v.pause(); try{v.currentTime=0}catch(_){} }
        }

        return h('div', { className:'rounded-xl p-4 border border-white/10 bg-white/[0.02]' },
            h('div', { className:'flex items-center justify-between gap-2 mb-3 flex-wrap' },
                h('div', null,
                    h('div',{className:'text-sm font-semibold flex items-center gap-2'}, '🎭 Browse stock avatars'),
                    h('div',{className:'text-[11px] text-white/40 mt-0.5'},'Tap an avatar to add it to your roster. Each one gets the next number.'),
                ),
                h('div', { className:'flex items-center gap-1' },
                    [['','All'],['female','Women'],['male','Men']].map(([val, label]) =>
                        h('button', {
                            key: val||'all',
                            onClick: () => setGender(val),
                            className: 'font-mono text-[10px] uppercase tracking-wider px-2.5 py-1 rounded-full border transition '+
                                (gender === val
                                    ? 'border-hv-green text-hv-green bg-hv-green/10'
                                    : 'border-white/10 text-white/50 hover:text-white hover:border-white/25'),
                        }, label)
                    )
                ),
            ),
            error && h('div',{className:'text-xs text-red-400 mb-2'}, 'Couldn\u2019t load catalog: '+error),
            !loaded
                ? h('div',{className:'text-center text-xs text-white/40 py-8'},'Loading HeyGen UGC catalog…')
                : visible.length === 0
                    ? h('div',{className:'text-center text-xs text-white/40 py-8'},'No avatars match that filter.')
                    : h('div',{className:'stk-grid'},
                        visible.map(a => {
                            const onRoster = rosterEngineIds.has(a.id);
                            return h('div', {
                                key: a.id,
                                className: 'stk-tile ' + (onRoster ? 'on-roster ' : '') + (adding === a.id ? 'opacity-60' : ''),
                                onMouseEnter: onEnter,
                                onMouseLeave: onLeave,
                                onClick: () => { if (!adding && !onRoster) onPick(a); },
                                title: onRoster ? 'Already on your roster' : `Add ${a.name} to your roster`,
                            },
                                a.preview_image_url && h('img', { src:a.preview_image_url, alt:a.name, loading:'lazy', referrerPolicy:'no-referrer' }),
                                a.preview_video_url && h('video', { src:a.preview_video_url, muted:true, loop:true, playsInline:true, preload:'none' }),
                                h('div', { className:'meta' },
                                    h('div',{className:'n'}, a.name),
                                    h('div',{className:'g'}, (a.gender||'').toString()),
                                )
                            );
                        })
                    )
        );
    }

    // Popup works for both roster avatars and stock (catalog) avatars.
    // Mode inferred from the shape of `data`:
    //   roster → has `display_number`, `avatar_engine_id`, `voice_status`
    //   stock  → has `id` (heygen id), `preview_video_url`, no display_number
    function AvatarPopup({ data, mode, customerPlan, thumbSrc,
                           onClose, onPick, onSetDefault, onUploadVoice,
                           onDelete, adding, voiceUploading }){
        if (!data) return null;

        useEffect(() => {
            const onKey = e => { if (e.key === 'Escape') onClose(); };
            document.addEventListener('keydown', onKey);
            document.body.style.overflow = 'hidden';
            return () => {
                document.removeEventListener('keydown', onKey);
                document.body.style.overflow = '';
            };
        }, [onClose]);

        const canClone = customerPlan === 'dominate' || customerPlan === 'special_ops';
        const isRoster = mode === 'roster';
        const isStock  = mode === 'stock';
        const onRosterMatch = isStock && data.__alreadyOnRoster;

        const imgSrc = isRoster
            ? (thumbSrc || null)
            : (data.preview_image_url || null);
        const videoSrc = isStock ? (data.preview_video_url || null) : null;

        const num   = isRoster ? data.display_number : null;
        const name  = data.name || (isStock ? 'Stock Avatar' : 'Unnamed');
        const type  = isRoster
            ? (data.type || 'photo')
            : 'stock · HeyGen UGC';
        const status = isRoster ? (data.status || '—') : 'available';
        const gender = data.gender || '';
        const voiceStatus = isRoster ? effectiveVoiceStatus(data) : null;
        const vs = voiceStatus && (VOICE_STATUS[voiceStatus] || VOICE_STATUS.none);
        const voiceStuck = voiceStatus === 'stuck' || voiceStatus === 'failed';

        return h('div', { className:'apop-back', onClick: e => { if (e.target.className === 'apop-back') onClose(); }},
            h('div', { className:'apop', role:'dialog', 'aria-modal':'true' },
                h('div', { className:'apop-handle' }),
                h('button', { className:'apop-close', onClick:onClose, 'aria-label':'Close' }, '✕'),
                h('div', { className:'apop-media' },
                    videoSrc && h('video', {
                        src:videoSrc, autoPlay:true, loop:true, muted:true, playsInline:true, preload:'metadata',
                    }),
                    !videoSrc && imgSrc && h('img', { src:imgSrc, alt:name, referrerPolicy:'no-referrer' }),
                    !videoSrc && !imgSrc && h('div', { className:'ph' }, '🎭'),
                ),
                h('div', { className:'apop-body' },
                    h('div', { className:'apop-id' },
                        num ? h('span', { className:'n' }, '#'+num) : null,
                        num ? h('span', { className:'sep' }, '·') : null,
                        h('span', null, type),
                        data.is_default && h('span', { className:'sep' }, '·'),
                        data.is_default && h('span', { style:{color:'#00ff88',fontWeight:800} }, 'DEFAULT'),
                    ),
                    h('div', { className:'apop-title' }, name),
                    h('div', { className:'apop-meta' },
                        gender && h('span', null, gender),
                        isRoster && h('span', null, status),
                        isRoster && data.created_at && h('span', null, 'added ' + ago(data.created_at)),
                    ),
                    isRoster && h('div', { className:'apop-voice' },
                        h('span', { className:'lbl' }, 'VOICE'),
                        h('span', { style:{color: vs ? undefined : 'rgba(255,255,255,.4)'} },
                            '🎙 ' + (vs ? vs.label : 'No clone')),
                        data.voice_name && h('span', { style:{color:'rgba(255,255,255,.45)'} }, '· ' + data.voice_name),
                    ),

                    // Actions vary by mode
                    isStock && h('div', { className:'apop-actions' },
                        h('button', {
                            className:'apop-act primary',
                            disabled: !!adding || onRosterMatch,
                            onClick: () => onPick(data),
                        }, onRosterMatch ? '✓ Already on your roster' :
                           (adding ? '⋯ Adding…' : '✓ Add to my roster')),
                        h('button', { className:'apop-act', onClick:onClose }, 'Cancel'),
                    ),

                    isRoster && h('div', { className:'apop-actions' },
                        !data.is_default && data.status === 'ready' && h('button', {
                            className:'apop-act primary',
                            onClick: () => { onSetDefault(data.id); onClose(); },
                        }, '★ Set as default'),
                        canClone && voiceStatus !== 'pending' && h('label', {
                            className:'apop-act ' + (voiceStuck ? 'danger' : ''),
                            style:{cursor:'pointer'},
                        },
                            voiceUploading ? '⋯ Uploading…' :
                            (voiceStatus === 'ready' ? '🎙 Replace voice sample' :
                             voiceStuck ? '🎙 Retry voice clone' : '🎙 Upload voice sample'),
                            h('input', {
                                type:'file', accept:'audio/*', style:{display:'none'},
                                disabled: voiceUploading,
                                onChange: e => { onUploadVoice(data, e.target.files?.[0]); },
                            }),
                        ),
                        h('button', {
                            className:'apop-act danger',
                            onClick: () => { onDelete(data); /* confirm handled in handler */ },
                        }, '✕ Remove from roster'),
                    ),
                )
            )
        );
    }

    function App(){
        const [session,setSession]=useState(null);
        const [customerId,setCustomerId]=useState(null);
        const [customerPlan,setCustomerPlan]=useState('launch');
        const [avatars,setAvatars]=useState(null);
        const [thumbs,setThumbs]=useState({});       // avatar.id → signed thumbnail URL
        const [uploading,setUploading]=useState(false);
        const [voiceUploadingFor,setVoiceUploadingFor]=useState(null);   // avatar.id | null
        const [dragActive,setDragActive]=useState(false);
        const [saved,setSaved]=useState('');
        const [error,setError]=useState(null);
        const [stockAdding,setStockAdding]=useState(null);               // heygen_id | null
        const [popup,setPopup]=useState(null);    // {data, mode: 'roster'|'stock'} | null
        const fileInput=useRef(null);

        useEffect(()=>{(async()=>{
            const {data:{session:s}}=await sb.auth.getSession();
            if(!s){window.location.replace('/sign-in');return}
            setSession(s);
            // Resolve customer_id + fetch their plan (plan gates voice cloning).
            let cid=s.user.user_metadata?.customer_id;
            if(!cid){
                const {data:c}=await sb.from('customers').select('id,plan').eq('email',s.user.email).maybeSingle();
                if(c?.id){cid=c.id; setCustomerPlan(c.plan||'launch')}
                else {setError('No customer record for your account.');return}
            } else {
                const {data:c}=await sb.from('customers').select('plan').eq('id',cid).maybeSingle();
                if(c) setCustomerPlan(c.plan||'launch');
            }
            setCustomerId(cid);
        })()},[]);

        // Thumbnail URLs stored on the avatars row use /object/public/ paths,
        // but the client-uploads bucket is PRIVATE — those render as broken
        // images. Generate short-lived signed URLs at render time instead.
        // 1-hour expiry is fine because the portal holds the session open and
        // Realtime triggers re-renders anyway.
        const signThumb=useCallback(async(row)=>{
            const raw=row.thumbnail_url;
            if(!raw) return null;
            // Parse the storage path from the URL. Supabase object URLs look like
            // https://<project>.supabase.co/storage/v1/object/public/<bucket>/<path>
            const m = raw.match(/\/object\/(?:public|authenticated|sign)\/[^/]+\/(.+?)(?:\?|$)/);
            if(!m) return raw;  // unexpected shape — try rendering verbatim
            const path = decodeURIComponent(m[1]);
            const {data,error}=await sb.storage.from(BUCKET).createSignedUrl(path, 3600);
            if(error){ console.warn('signed url failed for',path,error); return null; }
            return data.signedUrl;
        },[]);

        const load=useCallback(async()=>{
            if(!customerId)return;
            const {data,error}=await sb.from('avatars').select('*').eq('customer_id',customerId).order('created_at',{ascending:false});
            if(error){setError(error.code==='PGRST205'?'Portal tables not deployed yet.':error.message);setAvatars([]);return}
            const rows = data||[];
            setAvatars(rows);
            // Resolve thumbnails in parallel; update state once all are in.
            const entries = await Promise.all(rows.map(async r => [r.id, await signThumb(r)]));
            setThumbs(Object.fromEntries(entries));
        },[customerId, signThumb]);

        useEffect(()=>{
            if(!customerId)return;
            load();
            const ch=sb.channel(`avatars-${customerId}`).on('postgres_changes',{event:'*',schema:'public',table:'avatars',filter:`customer_id=eq.${customerId}`},()=>load()).subscribe();
            return()=>sb.removeChannel(ch);
        },[customerId,load]);

        const handleFiles=useCallback(async(files)=>{
            if(!files||!files.length||!customerId)return;
            setUploading(true);
            const uploaded=[];
            try{
                for(const f of files){
                    if(!f.type.startsWith('image/')&&!f.type.startsWith('video/')){
                        console.warn('skipping non-media:',f.name,f.type);continue;
                    }
                    const ts=Date.now();
                    const safe=f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
                    const path=`${customerId}/avatars/${ts}-${safe}`;
                    const {error:upErr}=await sb.storage.from(BUCKET).upload(path,f,{cacheControl:'3600',upsert:false});
                    if(upErr){console.error(upErr);continue}
                    const {data:pub}=sb.storage.from(BUCKET).getPublicUrl(path);
                    uploaded.push({path,url:pub.publicUrl,type:f.type.startsWith('image/')?'photo':'video'});
                }
                if(uploaded.length){
                    // Create an avatar row in 'pending' state. The provisioning
                    // server picks these up and submits to the avatar engine
                    // (future work — for now the row itself is the signal to ops).
                    const firstImg=uploaded.find(u=>u.type==='photo');
                    const {error:insErr}=await sb.from('avatars').insert({
                        customer_id:customerId,
                        name:'Avatar '+new Date().toLocaleDateString(),
                        type:uploaded[0].type,
                        status:'pending',
                        thumbnail_url:firstImg?firstImg.url:null,
                        source_files:uploaded.map(u=>u.url),
                    });
                    if(insErr)setError(insErr.message);
                    else{setSaved('Uploaded — your agent will train it shortly');setTimeout(()=>setSaved(''),2400)}
                }
            }catch(e){setError(e.message||String(e))}
            finally{setUploading(false)}
        },[customerId]);

        const setDefault=useCallback(async(id)=>{
            // Unset any existing default, then mark this one.
            await sb.from('avatars').update({is_default:false}).eq('customer_id',customerId);
            const {error}=await sb.from('avatars').update({is_default:true}).eq('id',id);
            if(error)setError(error.message);
            else{setSaved('Default avatar updated');setTimeout(()=>setSaved(''),1600)}
        },[customerId]);

        // Delete an avatar — wipes the Supabase row AND the droplet's
        // avatars.json entry via /api/avatar-delete, so the agent can't
        // accidentally route to a stale engine_id on the next render.
        // Numbers are sticky: the deleted #N is retired, next new avatar
        // gets max+1. Keeps "your avatar #4" references stable.
        const deleteAvatar=useCallback(async(avatar)=>{
            if(!customerId||!session)return;
            const n = avatar.display_number;
            const prompt = `Delete avatar${n?' #'+n:''} (${avatar.name||'Unnamed'})?\n\n`+
                `This removes it from your roster. To refresh the face or voice, `+
                `delete then re-upload a fresh photo or training video.`;
            if(!window.confirm(prompt))return;
            try{
                const r = await fetch('https://provision.hiviews.ai/api/avatar-delete',{
                    method:'POST',
                    headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
                    body: JSON.stringify({customer_id: customerId, avatar_id: avatar.id}),
                });
                if(!r.ok){
                    const j = await r.json().catch(()=>({}));
                    setError('Delete failed: '+(j.error||r.status));
                    return;
                }
                setSaved(n ? `Avatar #${n} deleted` : 'Avatar deleted');
                setTimeout(()=>setSaved(''),1800);
                // Realtime subscription will refresh the list automatically.
            }catch(e){ setError(e.message||'Delete failed'); }
        },[customerId,session]);

        // Pick a stock avatar from HeyGen's public UGC catalog. Calls
        // /api/avatar-select-stock which creates the avatars row (status
        // ready, display_number max+1) and mirrors the entry into the
        // droplet's avatars.json. Realtime subscription refreshes the
        // roster, so the new card (with its sticky #N) just appears.
        const pickStockAvatar=useCallback(async(stock)=>{
            if(!customerId||!session||!stock?.id)return;
            setStockAdding(stock.id);
            setError(null);
            try{
                const r = await fetch('https://provision.hiviews.ai/api/avatar-select-stock',{
                    method:'POST',
                    headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
                    body: JSON.stringify({
                        customer_id: customerId,
                        heygen_avatar_id: stock.id,
                        heygen_voice_id: stock.default_voice_id || null,
                        name: stock.name || 'Stock Avatar',
                        gender: stock.gender || '',
                        preview_image_url: stock.preview_image_url || '',
                    }),
                });
                const j = await r.json().catch(()=>({}));
                if(!r.ok){ setError(j.error || ('Add failed: '+r.status)); return; }
                if(j.status==='already_on_roster'){
                    setSaved(`${stock.name} is already on your roster`);
                }else{
                    const n = j.display_number;
                    setSaved(n ? `Added ${stock.name} as avatar #${n}` : `Added ${stock.name}`);
                }
                setTimeout(()=>setSaved(''),2200);
            }catch(e){ setError(e.message||'Add failed'); }
            finally{ setStockAdding(null); }
        },[customerId,session]);

        // Digital Twin training-video upload (Dominate+). Creates an avatars
        // row with type='digital_twin' + status='pending', signs a short-lived
        // URL so HeyGen can fetch the video, then fires /api/train-avatar.
        // Realtime surfaces status progression (pending → training → ready).
        const [twinUploading,setTwinUploading]=useState(false);
        const twinInput=useRef(null);
        const uploadTwin=useCallback(async(file)=>{
            if(!file||!customerId||!session)return;
            if(customerPlan!=='dominate'&&customerPlan!=='special_ops'){
                setError('Video-trained avatars require the Dominate plan. Upgrade at hiviews.ai/pricing.');return;
            }
            if(!file.type.startsWith('video/')){
                setError('Please upload a video file (mp4, mov, webm).');return;
            }
            // HeyGen requires 15s-600s. Can't reliably measure duration without
            // loading the file into a <video> element — keep size as a rough
            // guard and let HeyGen return the real error if it's too short.
            if(file.size<1*1024*1024){
                setError('Video is too small — need at least ~15 seconds of footage.');return;
            }
            if(file.size>500*1024*1024){
                setError('Video too large (max 500 MB). A 60-second 1080p clip is plenty.');return;
            }
            setTwinUploading(true);
            setError(null);
            try{
                // 1. Upload to Storage.
                const ts=Date.now();
                const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
                const path=`${customerId}/training-videos/${ts}-${safe}`;
                const {error:upErr}=await sb.storage.from(BUCKET).upload(path,file,{cacheControl:'3600',upsert:false});
                if(upErr)throw new Error('Upload failed: '+upErr.message);

                // 2. Sign it so HeyGen can fetch (1 hour — HeyGen pulls immediately).
                const {data:signed,error:signErr}=await sb.storage.from(BUCKET).createSignedUrl(path,60*60);
                if(signErr||!signed?.signedUrl)throw new Error('Could not generate signed URL');

                // 3. Create the avatars row in 'pending' so the UI shows something
                //    immediately — the endpoint will flip to 'training' once it
                //    triggers the droplet.
                const defaultName=(session.user.user_metadata?.name)||'My trained avatar';
                const {data:row,error:insErr}=await sb.from('avatars').insert({
                    customer_id:customerId,
                    name:defaultName,
                    type:'digital_twin',
                    status:'pending',
                    source_files:[path],
                }).select().single();
                if(insErr)throw new Error('Could not create avatar row: '+insErr.message);

                // 4. Fire the training job.
                const r=await fetch('https://provision.hiviews.ai/api/train-avatar',{
                    method:'POST',
                    headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
                    body:JSON.stringify({
                        customer_id:customerId,
                        avatar_id:row.id,
                        video_url:signed.signedUrl,
                        name:defaultName,
                    }),
                });
                if(r.status===402){
                    const j=await r.json().catch(()=>({}));
                    setError(j.message||'Video-trained avatars require the Dominate plan.');
                    // Clean up the pending row we optimistically created.
                    await sb.from('avatars').delete().eq('id',row.id);
                    return;
                }
                if(!r.ok){
                    const j=await r.json().catch(()=>({}));
                    await sb.from('avatars').delete().eq('id',row.id);
                    throw new Error('Trigger failed: '+(j.error||r.status));
                }
                setSaved('Training started — takes 15-45 minutes. You can close this page.');
                setTimeout(()=>setSaved(''),3500);
            }catch(e){setError(e.message||String(e))}
            finally{setTwinUploading(false);if(twinInput.current)twinInput.current.value=''}
        },[customerId,customerPlan,session]);

        // Voice clone upload: writes audio to Storage, fires /api/voice-clone.
        // Server-side plan gate returns 402 for Launch plan customers.
        const uploadVoice=useCallback(async(avatar,file)=>{
            if(!file||!customerId||!session)return;
            // Basic client-side guardrails — server enforces plan too
            if(customerPlan!=='dominate'&&customerPlan!=='special_ops'){
                setError('Voice cloning requires the Dominate plan. Upgrade at hiviews.ai/pricing.');return;
            }
            if(!file.type.startsWith('audio/')){
                setError('Please upload an audio file (mp3, wav, m4a, webm).');return;
            }
            if(file.size>25*1024*1024){
                setError('Audio file too large (max 25 MB).');return;
            }
            setVoiceUploadingFor(avatar.id);
            setError(null);
            try{
                const ts=Date.now();
                const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
                const path=`${customerId}/voices/${ts}-${safe}`;
                const {error:upErr}=await sb.storage.from(BUCKET).upload(path,file,{cacheControl:'3600',upsert:false});
                if(upErr)throw new Error('Upload failed: '+upErr.message);
                const {data:pub}=sb.storage.from(BUCKET).getPublicUrl(path);
                // Track the source in avatars.source_voice_files.
                const srcs=[...(avatar.source_voice_files||[]),pub.publicUrl];
                await sb.from('avatars').update({source_voice_files:srcs}).eq('id',avatar.id);
                // Fire the clone.
                const r=await fetch('https://provision.hiviews.ai/api/voice-clone',{
                    method:'POST',
                    headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
                    body:JSON.stringify({
                        customer_id:customerId,
                        avatar_id:avatar.id,
                        audio_url:pub.publicUrl,
                        voice_name:avatar.name||'Customer voice',
                        gender:'male',  // could come from brand_config later
                    }),
                });
                if(r.status===402){
                    const j=await r.json().catch(()=>({}));
                    setError(j.message||'Voice cloning requires the Dominate plan.');
                    return;
                }
                if(!r.ok){
                    const j=await r.json().catch(()=>({}));
                    throw new Error('Trigger failed: '+(j.error||r.status));
                }
                setSaved('Voice uploaded — cloning starts now (takes ~1 minute)');
                setTimeout(()=>setSaved(''),2400);
            }catch(e){setError(e.message||String(e))}
            finally{setVoiceUploadingFor(null)}
        },[customerId,customerPlan,session]);

        if(error&&!avatars)return h('div',{className:'p-8 text-red-400 text-sm'},error);
        if(avatars===null)return h('div',{className:'min-h-[60vh] flex items-center justify-center'},h('div',{className:'w-6 h-6 border-2 border-white/10 border-t-hv-green rounded-full animate-spin'}));

        return h(React.Fragment,null,
            h('header',{className:'sticky top-0 z-40 bg-black/90 backdrop-blur border-b border-white/10 px-4 py-3'},
                h('div',{className:'flex items-center justify-between'},
                    h('div',{className:'flex items-center gap-2'},
                        h('h1',{className:'text-lg font-bold tracking-tight'},'Avatars'),
                        avatars.length>0&&h('span',{className:'text-[10px] font-mono text-hv-green bg-hv-green/10 border border-hv-green/30 px-1.5 py-0.5 rounded'},avatars.length)),
                    h('span',{className:'flex items-center gap-1.5 text-[10px] font-mono text-white/40'},
                        h('span',{className:'w-1.5 h-1.5 bg-hv-green rounded-full pulse-green'}),'LIVE'))),

            h('main',{className:'max-w-2xl mx-auto px-4 py-6 pb-24 space-y-5'},

                error&&h('div',{className:'bg-orange-500/10 border border-orange-500/30 rounded-lg px-4 py-2 text-xs text-orange-300'},error),

                // ═══ YOUR ROSTER — prime real estate at the top ═══
                // Everything below this is about adding MORE avatars; what the
                // user already has needs to be the first thing they see.
                avatars.length === 0
                    ? h('div',{className:'rounded-xl p-6 text-center border border-white/10 bg-white/[0.02]'},
                        h('div',{className:'text-3xl mb-2'},'🎭'),
                        h('div',{className:'text-sm font-semibold mb-1'},'No avatars on your roster yet'),
                        h('div',{className:'text-xs text-white/40'},'Pick a stock avatar below or upload your own to get started.'))
                    : h('div',null,
                        h('div',{className:'flex items-baseline justify-between mb-2 px-1'},
                            h('div',{className:'text-[11px] font-mono uppercase tracking-wider text-white/40'},'Your roster'),
                            h('div',{className:'text-[10px] font-mono text-white/30'},'tap any card for details'),
                        ),
                        h('div',{className:'space-y-3'},
                            avatars.map(a=>h(AvatarCard,{
                                key:a.id, avatar:a,
                                thumbSrc:thumbs[a.id]||null,
                                onSetDefault:setDefault,
                                onUploadVoice:uploadVoice,
                                voiceUploading:voiceUploadingFor===a.id,
                                onDelete:deleteAvatar,
                                onOpen:(av)=>setPopup({data:av, mode:'roster'}),
                                customerPlan:customerPlan,
                            })))),

                // ═══ ADD MORE — dig twin, photo, stock browse ═══
                h('div',{className:'flex items-center gap-3 pt-2'},
                    h('div',{className:'flex-1 h-px bg-white/10'}),
                    h('div',{className:'text-[10px] font-mono uppercase tracking-wider text-white/40'},'Add more avatars'),
                    h('div',{className:'flex-1 h-px bg-white/10'}),
                ),

                // Dominate-only: "train from video" tile — much better mouth sync
                // + motion than the photo path below.
                (customerPlan==='dominate'||customerPlan==='special_ops') && h('div',{
                    className:'rounded-xl p-5 cursor-pointer border border-hv-green/30 bg-gradient-to-br from-hv-green/[0.06] to-transparent hover:border-hv-green/60 transition',
                    onClick:()=>!twinUploading&&twinInput.current?.click(),
                },
                    h('div',{className:'flex items-start gap-3'},
                        h('div',{className:'text-2xl'},'🎬'),
                        h('div',{className:'flex-1 min-w-0'},
                            h('div',{className:'flex items-center gap-2 mb-1'},
                                h('span',{className:'text-sm font-semibold'},twinUploading?'Uploading training video…':'Train a pro avatar from video'),
                                h('span',{className:'font-mono text-[9px] text-hv-green bg-hv-green/10 border border-hv-green/30 px-1.5 py-0.5 rounded'},'DOMINATE'),
                            ),
                            h('div',{className:'text-xs text-white/50 leading-relaxed'},
                                'Upload a 30–60 second clip of yourself talking to camera. HeyGen trains a custom model that captures your expressions and motion. Sharper lip-sync and far more natural than photo avatars. Training takes 15–45 minutes.'),
                        ),
                    ),
                    h('input',{ref:twinInput,type:'file',accept:'video/mp4,video/quicktime,video/webm',className:'hidden',onChange:e=>uploadTwin(e.target.files?.[0])}),
                ),

                (customerPlan!=='dominate'&&customerPlan!=='special_ops') && h('div',{
                    className:'rounded-xl p-4 border border-white/10 bg-white/[0.02] text-xs text-white/50',
                },
                    h('span',{className:'font-semibold text-white/70'},'🔒 Video-trained avatars — Dominate plan'),
                    h('div',{className:'mt-1'},'Photo avatars have rough mouth movement. Upgrade to train a pro avatar from a 30-60s video clip — HeyGen trains a model that nails your expressions and motion.'),
                    h('a',{href:'/pricing',className:'inline-block mt-2 text-hv-green underline'},'See pricing →'),
                ),

                h('div',{
                    className:['drop-zone p-6 text-center cursor-pointer',dragActive?'active':''].join(' '),
                    onClick:()=>fileInput.current?.click(),
                    onDragOver:e=>{e.preventDefault();setDragActive(true)},
                    onDragLeave:()=>setDragActive(false),
                    onDrop:e=>{e.preventDefault();setDragActive(false);handleFiles(e.dataTransfer.files)},
                },
                    h('div',{className:'text-3xl mb-2'},'📸'),
                    h('div',{className:'text-sm font-semibold mb-1'},uploading?'Uploading…':'Upload a photo avatar'),
                    h('div',{className:'text-xs text-white/40'},'Fast path — a clear selfie is all you need. Lower quality mouth motion than a trained avatar.'),
                    h('input',{ref:fileInput,type:'file',accept:'image/*,video/*',multiple:true,className:'hidden',onChange:e=>handleFiles(e.target.files)}),
                ),

                // Browse HeyGen's public UGC catalog. Tapping a tile opens the
                // popup (preview, confirm) instead of auto-adding — Brian's
                // feedback: "Everyone's gonna be clicking them thinking
                // there's a pop-up window."
                h(StockAvatarBrowse, {
                    onPick: (stock)=>{
                        const already = new Set((avatars||[]).map(a=>a.avatar_engine_id).filter(Boolean)).has(stock.id);
                        setPopup({data:{...stock, __alreadyOnRoster:already}, mode:'stock'});
                    },
                    adding: stockAdding,
                    rosterEngineIds: new Set((avatars||[]).map(a=>a.avatar_engine_id).filter(Boolean)),
                })),

            popup && h(AvatarPopup, {
                data: popup.data,
                mode: popup.mode,
                customerPlan: customerPlan,
                thumbSrc: popup.mode==='roster' ? (thumbs[popup.data.id]||null) : null,
                adding: popup.mode==='stock' && stockAdding === popup.data?.id,
                voiceUploading: popup.mode==='roster' && voiceUploadingFor === popup.data?.id,
                onClose: ()=>setPopup(null),
                onPick: async (s)=>{ await pickStockAvatar(s); setPopup(null); },
                onSetDefault: setDefault,
                onUploadVoice: (av, file)=>{ uploadVoice(av, file); setPopup(null); },
                onDelete: async (av)=>{ await deleteAvatar(av); setPopup(null); },
            }),

            saved&&h('div',{className:'saved-toast'},saved),
            h(Nav));
    }
    createRoot(document.getElementById('root')).render(h(App));
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
        window.addEventListener('load', () => { navigator.serviceWorker.register('/portal-sw.js', { scope: '/portal/' }).catch(() => {}); });
    }
</script>
</body>
</html>
