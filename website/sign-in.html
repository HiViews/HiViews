<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiViews — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{max-width:420px;width:100%;padding:40px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:16px}
        h1{font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-.5px}
        p.sub{font-size:14px;color:#888;margin-bottom:24px}
        label{display:block;font-size:13px;font-weight:600;color:#ccc;margin-bottom:6px}
        input{width:100%;padding:12px 16px;background:#111;border:1px solid #222;border-radius:8px;color:#fff;font-size:15px;font-family:inherit;margin-bottom:16px;outline:none}
        input:focus{border-color:#00ff88}
        button{width:100%;padding:14px;background:#00ff88;color:#000;font-size:15px;font-weight:700;border:none;border-radius:8px;cursor:pointer}
        button:hover{opacity:.9}
        button:disabled{opacity:.4;cursor:not-allowed}
        .error{color:#ff4444;font-size:13px;margin-bottom:12px;display:none}
        .forgot{text-align:center;margin-top:16px}
        .forgot a{color:#00ff88;font-size:13px;text-decoration:none}
        .forgot a:hover{text-decoration:underline}
    </style>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<div class="card">
    <h1>Sign in to HiViews</h1>
    <p class="sub">Access your dashboard, videos, and content pipeline.</p>

    <div class="error" id="errorMsg"></div>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autofocus>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Your password">

    <button id="loginBtn" onclick="signIn()">Sign In &rarr;</button>

    <div class="forgot">
        <a href="/reset-password">Forgot your password?</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://rkudnkbpnfxpxglaklqs.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Ll3KUfVgGqeCMUTSlAd4bA_YoD-SHkA';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        window.location.href = '/portal/dashboard';
    }
}

async function signIn() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('errorMsg');
    const btn = document.getElementById('loginBtn');

    errorEl.style.display = 'none';

    if (!email || !password) {
        errorEl.textContent = 'Enter your email and password.';
        errorEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    });

    if (error) {
        errorEl.textContent = error.message || 'Invalid email or password.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In \u2192';
        return;
    }

    window.location.href = '/portal/dashboard';
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') signIn();
});

checkSession();
</script>
</body>
</html>
