<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkOps — Privacy Policy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column}
        nav{padding:16px 24px;border-bottom:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center}
        nav .logo{font-size:20px;font-weight:900;letter-spacing:-.5px;color:#fff;text-decoration:none}
        nav .back{font-size:13px;color:#777;text-decoration:none;transition:color .2s}
        nav .back:hover{color:#fff}
        main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;text-align:center}
        .card{max-width:480px}
        h1{font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:12px}
        p{font-size:16px;color:#b0b0b0;line-height:1.7;margin-bottom:24px}
        .btn{display:inline-flex;padding:12px 28px;font-family:inherit;font-size:14px;font-weight:600;color:#000;background:#00ff88;border:none;border-radius:8px;cursor:pointer;text-decoration:none;transition:all .2s}
        .btn:hover{background:#00e67a;transform:translateY(-1px)}
        footer{padding:24px;border-top:1px solid #1a1a1a;text-align:center}
        footer p{font-size:12px;color:#555;margin:0}
    </style>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <nav>
        <a class="logo" href="/">DarkOps</a>
        <a class="back" href="/">← Back to home</a>
    </nav>
    <main>
        <div class="card">
            <h1>Privacy Policy</h1>
            <p>Your privacy matters. DarkOps's privacy policy is being finalized. For questions, reach out to support@darkops.team.</p>
            <a class="btn" href="/">Go to homepage</a>
        </div>
    </main>
    <footer><p>© 2026 DarkOps · New Empire AI</p></footer>
</body>
</html>
